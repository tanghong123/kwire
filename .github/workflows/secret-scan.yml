name: Secret scan

# Defence in depth for a public repo: the local .githooks/pre-commit hook is
# opt-in (git can't auto-enable a committed hook), so this scans every push and
# PR server-side with the same .gitleaks.toml allowlist. Fails the build if a
# credential lands on a branch.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so pushes are scanned commit-by-commit

      - name: Install gitleaks
        run: |
          VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan git history
        run: gitleaks git . --config .gitleaks.toml --redact --no-banner --verbose
