name: Release

# Build a versioned GitHub Release when the version in
# app/src-tauri/tauri.conf.json changes. Ordinary pushes to main just run CI
# (see ci.yml) — this only fires when no `v<version>` release exists yet.
#
# IMMUTABLE RELEASES: this repo has immutable releases enabled, so a *published*
# release rejects new assets. We therefore build into a DRAFT release (mutable),
# attach the macOS bundles + the kwire TUI binary, and leave it as a draft. A
# human finalizes locally (the demo video is recorded locally per release):
#
#   gh release upload  v<version> demo/out/kwire-tour.mp4   # add the tour video
#   gh release edit    v<version> --draft=false             # publish (-> tag)
#
# Publishing the draft is also what creates the git tag, after which this
# workflow won't re-trigger for that version.
on:
  push:
    branches: [main]

# Needed to create the draft release and upload assets.
permissions:
  contents: write

jobs:
  detect:
    name: Detect version bump
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4

      - id: check
        name: Has this version already been released (draft or published)?
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(jq -r .version app/src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # `gh release view` finds drafts too, so a half-finished draft never
          # gets duplicated on the next push.
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "Release v$VERSION already exists (draft or published) — skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "No release v$VERSION yet — will build a draft."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Build & draft (universal macOS)
    needs: detect
    if: needs.detect.outputs.should_release == 'true'
    # One Apple-Silicon runner cross-builds both arches and lipos them into a
    # single universal artifact. This replaces the old per-arch matrix, which
    # also removed a race where two jobs uploaded to the same draft (and the
    # "immutable release" upload conflict once the draft was published).
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-universal

      # Standalone terminal binary (`kwire`) as a UNIVERSAL Mach-O: build each
      # arch, then lipo them together. libgen-tui doesn't depend on the Tauri app
      # crate, so these are light builds.
      - name: Build TUI binary (universal)
        run: |
          cargo build --release -p libgen-tui --bin kwire --target aarch64-apple-darwin
          cargo build --release -p libgen-tui --bin kwire --target x86_64-apple-darwin
          mkdir -p dist
          lipo -create -output dist/kwire-universal-apple-darwin \
            target/aarch64-apple-darwin/release/kwire \
            target/x86_64-apple-darwin/release/kwire
          lipo -info dist/kwire-universal-apple-darwin

      # Build the Kwire desktop app into a DRAFT v<version> release as a UNIVERSAL
      # .app (tauri lipos the two arches for `universal-apple-darwin`). Draft (not
      # published) so assets can still be attached under immutable releases. No
      # frontend build step: tauri.conf ships the prebuilt static app/ui
      # (frontendDist "../ui"). Bundle is UNSIGNED and .app-only (no flaky DMG).
      - name: Build & draft desktop app (universal)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code-signing + notarization. When these secrets are unset the
          # env vars are empty and tauri-action builds an UNSIGNED .app (the old
          # behavior); once they're set, the .app is Developer-ID signed and
          # notarized so Gatekeeper lets novice users open it without the
          # right-click ▸ Open dance. Requires an Apple Developer account:
          #   APPLE_CERTIFICATE            base64 of the "Developer ID Application"
          #                                cert exported as .p12
          #   APPLE_CERTIFICATE_PASSWORD   the .p12 export password
          #   APPLE_SIGNING_IDENTITY       e.g. "Developer ID Application: Name (TEAMID)"
          #   APPLE_ID                     your Apple ID email
          #   APPLE_PASSWORD               an app-specific password for that Apple ID
          #   APPLE_TEAM_ID                your 10-char Apple Team ID
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: app
          tagName: v${{ needs.detect.outputs.version }}
          releaseName: Kwire v${{ needs.detect.outputs.version }}
          releaseBody: Automated build for v${{ needs.detect.outputs.version }}. Finalize by attaching kwire-tour.mp4 and publishing.
          releaseDraft: true
          prerelease: false
          args: --target universal-apple-darwin

      # Attach the universal TUI binary to the same draft.
      - name: Upload TUI binary to the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "v${{ needs.detect.outputs.version }}" "dist/kwire-universal-apple-darwin" --clobber
