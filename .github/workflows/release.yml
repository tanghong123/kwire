name: Release

# Cut a versioned GitHub Release automatically when the version in
# app/src-tauri/tauri.conf.json changes. Ordinary pushes to main just run CI
# (see ci.yml) — this workflow only publishes when `v<version>` has no tag yet.
on:
  push:
    branches: [main]

# Needed to create the tag + GitHub Release and upload assets.
permissions:
  contents: write

jobs:
  detect:
    name: Detect version bump
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # fetch history + tags so we can test for v<version>

      - id: check
        name: Compare tauri.conf.json version against existing tags
        run: |
          VERSION=$(jq -r .version app/src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git rev-parse -q --verify "refs/tags/v$VERSION" >/dev/null; then
            echo "Tag v$VERSION already exists — nothing to release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version v$VERSION — a release will be cut."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  release:
    name: Build & release (${{ matrix.target }})
    needs: detect
    if: needs.detect.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14 # Apple Silicon
            target: aarch64-apple-darwin
          - runner: macos-13 # Intel
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      # Standalone terminal binary (`kwire`). libgen-tui doesn't depend on the
      # Tauri app crate, so this is a light build.
      - name: Build TUI binary
        run: cargo build --release -p libgen-tui --bin kwire --target ${{ matrix.target }}

      - name: Stage TUI binary
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/kwire" "dist/kwire-${{ matrix.target }}"

      # Build the Kwire desktop bundles AND create / reuse the v<version> release.
      # The first matrix job creates the release + tag; the second reuses it.
      # No frontend build step: tauri.conf.json ships the prebuilt static app/ui
      # (frontendDist "../ui"), so there is no beforeBuildCommand / npm install.
      # Bundles are UNSIGNED — see note in the workflow PR/description.
      - name: Build & release desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          tagName: v${{ needs.detect.outputs.version }}
          releaseName: Kwire v${{ needs.detect.outputs.version }}
          releaseBody: Automated release for v${{ needs.detect.outputs.version }}.
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

      # Attach the TUI binary to the same release (the desktop step above created
      # it). Distinct filename per arch, so the two matrix jobs never collide.
      - name: Upload TUI binary to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "v${{ needs.detect.outputs.version }}" "dist/kwire-${{ matrix.target }}" --clobber
