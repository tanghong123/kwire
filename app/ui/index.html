<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kwire</title>
<!--
  Self-contained UX prototype. Everything (data, styles, logic) is inline and
  uses a CLASSIC <script> (no ES modules), so it runs when opened directly via
  file:// with a double-click — no server or build step.

  Design goals, balanced:
    1) Simplicity   — one primary view (the list), progressive disclosure via a
                      detail drawer + import sheet; occasional actions stay out of
                      the way.
    2) Informative  — a "Needs you" filter surfaces exactly the items requiring a
                      decision; inline status + progress; a per-host activity bar
                      makes the polite per-host download queues visible.
    3) Aesthetics   — native-macOS leaning: SF system font, restrained palette with
                      a single accent, generous whitespace, light/dark via the OS.
-->
<style>
  :root {
    --accent: #2f6bff;
    --bg: #ececee;
    --chrome: #e6e6e9;
    --panel: #ffffff;
    --panel-2: #f6f6f8;
    --sidebar: #e9e9ec;
    --text: #1d1d1f;
    --text-dim: #6e6e76;
    --text-faint: #9a9aa2;
    --border: #d9d9de;
    --border-strong: #c6c6cc;
    --row-hover: #f0f2f7;
    --row-sel: #e4ecff;
    --green: #1a9c4e;
    --green-bg: #e3f5ea;
    --amber: #b5710b;
    --amber-bg: #fbeed3;
    --red: #d23b32;
    --red-bg: #fbe4e2;
    --blue-bg: #e4ecff;
    --shadow: 0 8px 30px rgba(0,0,0,.16);
    --radius: 9px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --accent: #4d83ff;
      --bg: #1c1c1e;
      --chrome: #2a2a2d;
      --panel: #232326;
      --panel-2: #29292d;
      --sidebar: #202023;
      --text: #f2f2f4;
      --text-dim: #a0a0a8;
      --text-faint: #6f6f78;
      --border: #38383d;
      --border-strong: #46464d;
      --row-hover: #2c2c31;
      --row-sel: #2d3d63;
      --green: #43c970; --green-bg: #173626;
      --amber: #e3a23a; --amber-bg: #3a2e15;
      --red: #ff6b60; --red-bg: #3a1e1c;
      --blue-bg: #26345c;
      --shadow: 0 10px 36px rgba(0,0,0,.5);
    }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font: 13px/1.45 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
    color: var(--text);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  button { font: inherit; color: inherit; cursor: pointer; }

  /* ---- window shell ---- */
  .app { display: flex; flex-direction: column; height: 100vh; }
  .titlebar {
    height: 38px; flex: 0 0 38px; display: flex; align-items: center;
    background: var(--chrome); border-bottom: 1px solid var(--border);
    padding: 0 12px; gap: 12px; -webkit-user-select: none; user-select: none;
  }
  .traffic { display: flex; gap: 8px; }
  .traffic i { width: 12px; height: 12px; border-radius: 50%; display: block; }
  .traffic .r { background: #ff5f57; } .traffic .y { background: #febc2e; } .traffic .g { background: #28c840; }
  .titlebar .name { font-weight: 600; font-size: 13px; letter-spacing: .2px; }
  .titlebar .spacer { flex: 1; }
  .tbtn {
    border: 1px solid var(--border-strong); background: var(--panel);
    padding: 5px 12px; border-radius: 7px; font-weight: 500; font-size: 12px;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .tbtn:hover { background: var(--row-hover); }
  .tbtn:disabled { opacity: .4; cursor: not-allowed; }
  .tbtn:disabled:hover { background: var(--panel); }
  .ctxmenu { position: fixed; z-index: 60; background: var(--panel); border: 1px solid var(--border-strong);
    border-radius: 8px; box-shadow: var(--shadow); padding: 4px; min-width: 170px; }
  .ctxmenu.hide { display: none; }
  .ctxmenu button { display: flex; align-items: center; gap: 8px; width: 100%; text-align: left;
    border: 0; background: none; padding: 7px 10px; border-radius: 6px; font-size: 13px; cursor: pointer; }
  .ctxmenu button:hover { background: var(--row-hover); }
  .ctxmenu button.ctx-danger { color: var(--red); }
  .ctxmenu button.ctx-danger:hover { background: var(--red-bg); }
  .ctxmenu .ctx-head { padding: 5px 10px 6px; font-size: 11px; color: var(--text-faint);
    border-bottom: 1px solid var(--border); margin-bottom: 3px; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
  .tbtn.primary { background: var(--accent); color: #fff; border-color: transparent; }
  .tbtn.primary:hover { filter: brightness(1.07); }

  .body { flex: 1; display: flex; min-height: 0; }

  /* ---- sidebar ---- */
  .sidebar {
    width: var(--sidebar-w, 216px); flex: 0 0 var(--sidebar-w, 216px); background: var(--sidebar);
    border-right: 1px solid var(--border); padding: 12px 10px; overflow-y: auto;
  }
  .sidebar.collapsed { display: none; }
  .sidebar.collapsed + .sidebar-resize { display: none; }
  /* Drag handle to resize the sidebar (sits on its right edge). */
  .sidebar-resize { flex: 0 0 5px; cursor: col-resize; margin-left: -3px; z-index: 5; }
  .sidebar-resize:hover, .sidebar-resize.dragging { background: var(--accent); opacity: .5; }
  .side-h { font-size: 11px; font-weight: 600; color: var(--text-faint);
    text-transform: uppercase; letter-spacing: .6px; margin: 14px 8px 6px; }
  .side-h:first-child { margin-top: 2px; }
  .side-item {
    display: flex; align-items: center; gap: 8px; padding: 6px 8px;
    border-radius: 7px; color: var(--text); width: 100%; border: 0; background: none;
    text-align: left;
  }
  .side-item:hover { background: var(--row-hover); }
  .side-item.active { background: var(--accent); color: #fff; }
  .side-item .dot { width: 9px; height: 9px; border-radius: 50%; flex: 0 0 9px; }
  .side-item .lbl { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .side-item .ct { font-variant-numeric: tabular-nums; color: var(--text-dim); font-size: 12px; }
  .side-item.active .ct { color: #fff; opacity: .85; }
  .side-item .side-st { width: 7px; height: 7px; border-radius: 50%; flex: 0 0 7px; }
  .side-item .side-st.active { background: var(--green); }
  .side-item .side-st.paused { background: var(--text-dim); }
  .side-item.active .side-st.active { background: #fff; }
  .side-item .ic { width: 16px; text-align: center; opacity: .8; }

  /* ---- main ---- */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--panel); }
  .toolbar { padding: 14px 18px 10px; border-bottom: 1px solid var(--border); }
  .toolbar .row1 { display: flex; align-items: baseline; gap: 10px; }
  .toolbar h1 { font-size: 17px; font-weight: 700; margin: 0; }
  .toolbar .sub { color: var(--text-dim); font-size: 12px; }
  .toolbar .row2 { display: flex; align-items: center; gap: 14px; margin-top: 10px; }
  .prog-wrap { flex: 1; height: 7px; background: var(--panel-2); border-radius: 4px;
    overflow: hidden; border: 1px solid var(--border); display: flex; }
  .prog-wrap .seg { height: 100%; }
  .seg.done { background: var(--green); } .seg.active { background: var(--accent); }
  .seg.attn { background: var(--amber); } .seg.fail, .seg.cantdl { background: var(--red); }
  .prog-num { font-variant-numeric: tabular-nums; color: var(--text-dim); font-size: 12px; white-space: nowrap; }
  .row3 { display: flex; align-items: center; gap: 8px; margin-top: 9px; }
  .fmt-lbl { font-size: 11px; font-weight: 600; color: var(--text-faint); text-transform: uppercase; letter-spacing: .5px; }
  .fmt-rank { display: block; }
  .fmt-rank .sep { color: var(--text-faint); }
  .frank-row { display: flex; align-items: center; flex-wrap: wrap; gap: 4px; }
  .frank .mv.rm { color: var(--red); }
  .frank .mv.rm:hover { background: var(--red); color: #fff; }
  .frank-add { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .frank-add .add-lbl { font-size: 12px; color: var(--text-dim); }
  .addchip { border: 1px solid var(--border-strong); background: var(--panel); border-radius: 14px;
    padding: 3px 9px; font-size: 12px; font-weight: 500; }
  .addchip:hover { background: var(--row-hover); border-color: var(--accent); }
  .addchip.ghost { color: var(--accent); border-style: dashed; }
  .frank { display: inline-flex; align-items: center; gap: 5px; border: 1px solid var(--border-strong);
    background: var(--panel-2); border-radius: 20px; padding: 3px 4px 3px 10px; font-size: 12px; font-weight: 600; }
  .frank .rk { color: var(--text-faint); font-variant-numeric: tabular-nums; font-weight: 500; }
  .frank .mv { border: 0; background: var(--panel); border-radius: 50%; width: 18px; height: 18px; line-height: 1;
    color: var(--text-dim); padding: 0; display: inline-flex; align-items: center; justify-content: center; }
  .frank .mv:hover { background: var(--accent); color: #fff; }
  .frank .mv[disabled] { opacity: .3; cursor: default; }

  .filters { display: flex; gap: 7px; padding: 10px 18px; border-bottom: 1px solid var(--border);
    overflow-x: auto; }
  .chip {
    border: 1px solid var(--border-strong); background: var(--panel);
    padding: 4px 11px; border-radius: 20px; font-size: 12px; font-weight: 500;
    display: inline-flex; gap: 6px; align-items: center; white-space: nowrap;
  }
  .chip:hover { background: var(--row-hover); }
  .chip.active { background: var(--text); color: var(--panel); border-color: transparent; }
  .chip .n { font-variant-numeric: tabular-nums; opacity: .7; }
  .chip.attn.active { background: var(--amber); }
  .chip.cantdl.active { background: var(--red); border-color: transparent; color: #fff; }
  .querybar { display: flex; align-items: center; gap: 8px; padding: 8px 18px; font-size: 12px;
    font-weight: 600; color: var(--accent); background: var(--blue-bg); border-bottom: 1px solid var(--border); }
  .qspin { width: 12px; height: 12px; border: 2px solid var(--accent); border-top-color: transparent;
    border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .workspace { flex: 1; display: flex; min-height: 0; }
  .listwrap { flex: 1; overflow-y: auto; min-width: 0; }
  .group-h {
    position: sticky; top: 0; z-index: 1; background: var(--panel-2);
    border-bottom: 1px solid var(--border); padding: 7px 18px;
    display: flex; align-items: center; gap: 8px; cursor: pointer;
    font-weight: 600; font-size: 12px; color: var(--text-dim);
  }
  .group-h .tw { width: 12px; transition: transform .12s; color: var(--text-faint); display: inline-block; }
  .group-h.collapsed .tw { transform: rotate(-90deg); }
  .group-h .gname { color: var(--text); }
  .group-h .gcount { margin-left: auto; font-weight: 500; font-variant-numeric: tabular-nums; }

  .cover { display: inline-block; vertical-align: middle; border-radius: 3px; object-fit: cover; box-shadow: 0 1px 3px rgba(0,0,0,.22); background: var(--panel-2); }
  .cv-sm { width: 26px; height: 36px; }
  .cv-lg { width: 96px; height: 132px; }
  .cover-ph { display: inline-flex; align-items: center; justify-content: center; font-weight: 700; font-size: 9px; box-shadow: none; }
  .cv-lg.cover-ph { font-size: 14px; letter-spacing: .5px; }
  .book {
    display: grid; grid-template-columns: 30px 26px 1fr auto 84px; align-items: center;
    gap: 12px; padding: 8px 18px; border-bottom: 1px solid var(--border); cursor: pointer;
  }
  .book:hover { background: var(--row-hover); }
  .book.sel { background: var(--row-sel); }
  .book .seq { color: var(--text-faint); font-variant-numeric: tabular-nums; font-size: 12px; text-align: right; }
  .book .meta { min-width: 0; }
  .book .t { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .book .a { color: var(--text-dim); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .book .a .bf { border-bottom: 1px dotted var(--text-faint); }
  .fmt { font-size: 10px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase;
    color: var(--text-dim); background: var(--panel-2); border: 1px solid var(--border);
    padding: 2px 6px; border-radius: 5px; }

  .vglyphs { display: inline-flex; gap: 5px; align-items: center; }
  .vg { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .3px;
    padding: 2px 6px; border-radius: 5px; border: 1px solid transparent; }
  .vg-done { color: var(--green); background: var(--green-bg); }
  .vg-active { color: var(--accent); background: var(--blue-bg); }
  .vg-fail { color: var(--red); background: var(--red-bg); }
  .status { display: inline-flex; align-items: center; gap: 7px; min-width: 150px; justify-content: flex-end; }
  .chip-s { font-size: 11px; font-weight: 600; padding: 2px 9px; border-radius: 20px; white-space: nowrap; }
  .s-queued { color: var(--text-dim); background: var(--panel-2); border: 1px solid var(--border); }
  .s-done { color: var(--green); background: var(--green-bg); }
  .s-attn { color: var(--amber); background: var(--amber-bg); }
  .s-fail { color: var(--red); background: var(--red-bg); }
  .s-active { color: var(--accent); background: var(--blue-bg); }
  .s-avail { color: var(--text-faint); background: var(--panel-2); border: 1px solid var(--border); }
  .mini { width: 74px; height: 6px; background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 4px; overflow: hidden; }
  .mini > i { display: block; height: 100%; background: var(--accent); }
  .rowbtn { border: 1px solid var(--border-strong); background: var(--panel); padding: 3px 10px;
    border-radius: 6px; font-size: 12px; font-weight: 500; }
  .rowbtn:hover { background: var(--row-hover); }
  .rowbtn.amber { color: var(--amber); border-color: var(--amber); }

  /* ---- per-variation rows inside a book entry (stacked vertically) ---- */
  .vlist { display: flex; flex-direction: column; gap: 3px; min-width: 230px; }
  .vline { display: grid; grid-template-columns: 44px 56px minmax(108px, 1fr) 84px;
    gap: 10px; align-items: center; font-size: 11px; line-height: 1.45; }
  .vline.bookline { grid-template-columns: auto; justify-items: start; }
  .vt { font-weight: 700; text-transform: uppercase; letter-spacing: .3px; }
  .vsz { color: var(--text-dim); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .vwarn { font-size: 10px; font-weight: 700; color: var(--amber); white-space: nowrap; }
  .vstat { display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; color: var(--text-dim); }
  .vstat .vpct { font-variant-numeric: tabular-nums; }
  .vbar { height: 6px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .vbar.empty { background: transparent; border-color: transparent; }
  .vbar > i { display: block; height: 100%; background: var(--accent); }
  /* Animated hourglass = ACTIVELY downloading; a still hourglass = queued/waiting. */
  .hourglass { display: inline-block; }
  .hourglass.run { animation: hgflip 1.5s ease-in-out infinite; }
  @keyframes hgflip { 0%, 42% { transform: rotate(0deg); } 50%, 92% { transform: rotate(180deg); } 100% { transform: rotate(360deg); } }

  /* ---- bottom active-work panel (collapsible) ---- */
  .activepanel { flex: 0 0 auto; border-top: 1px solid var(--border); background: var(--chrome);
    display: flex; flex-direction: column; min-height: 0; position: relative; }
  /* Expanded: a FIXED, user-adjustable height (drag the top edge). Downloads coming and
     going scroll the body internally instead of changing the panel height — so the book
     list above never reflows on progress. Collapsed: header only (auto height). */
  .activepanel:not(.collapsed) { height: var(--ap-h, 240px); }
  .ap-resize { position: absolute; top: -3px; left: 0; right: 0; height: 7px; cursor: row-resize; z-index: 6; }
  .ap-resize:hover, .ap-resize.dragging { background: var(--accent, #5b9aa0); opacity: .35; }
  .activepanel.collapsed .ap-resize { display: none; }
  .ap-head { display: flex; align-items: center; gap: 9px; padding: 7px 18px; cursor: pointer;
    font-size: 12px; user-select: none; }
  .ap-head .tw { display: inline-block; width: 11px; transition: transform .12s; color: var(--text-faint); }
  .activepanel.collapsed .tw { transform: rotate(-90deg); }
  .ap-title { font-weight: 600; text-transform: uppercase; font-size: 10px; letter-spacing: .5px; color: var(--text-faint); }
  .ap-sum { color: var(--text-dim); font-variant-numeric: tabular-nums; }
  .ap-head .spacer { flex: 1; }
  .ap-hosts { display: inline-flex; gap: 12px; }
  .activepanel.collapsed .ap-body { display: none; }
  .ap-body { flex: 1 1 0; min-height: 0; overflow-y: auto; padding: 2px 18px 10px; }
  .ap-sec { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px;
    color: var(--text-faint); margin: 8px 0 4px; }
  .ap-row { display: grid; grid-template-columns: 1fr 110px 150px; gap: 12px; align-items: center;
    padding: 4px 0; font-size: 12px; border-bottom: 1px solid var(--border); }
  .ap-row .nm { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ap-row .nm small { color: var(--text-dim); }
  .ap-bar { height: 6px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .ap-bar > i { display: block; height: 100%; background: var(--accent); }
  /* A speculative (hedge) leg racing the primary on another host. */
  .hedge-badge { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .3px;
    color: var(--amber); background: var(--amber-bg); border: 1px solid var(--amber);
    padding: 0 5px; border-radius: 4px; vertical-align: middle; }
  /* "connecting" = no bytes yet: an indeterminate sliding sliver. */
  .ap-bar.indet > i { width: 35% !important; background: var(--text-faint); animation: indet 1.2s ease-in-out infinite; }
  @keyframes indet { 0% { margin-left: -35% } 100% { margin-left: 100% } }
  .ap-stats { text-align: right; color: var(--text-dim); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .ap-empty { color: var(--text-faint); font-size: 12px; padding: 8px 0; }
  .host { display: inline-flex; align-items: center; gap: 7px; color: var(--text-dim); }
  .host .slots { display: inline-flex; gap: 3px; }
  .host .slots i { width: 8px; height: 8px; border-radius: 50%; background: var(--border-strong); display: block; }
  .host .slots i.on { background: var(--accent); animation: pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .35 } }

  /* ---- inline detail panel (side-by-side with the list) ---- */
  .detail {
    flex: 0 0 380px; min-width: 0; background: var(--panel); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .detail.collapsed { display: none; }
  .detail .dh { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: flex-start; }
  .detail .dh .dh-meta { min-width: 0; }
  .detail .dh .x { margin-left: auto; border: 0; background: none; font-size: 16px; color: var(--text-dim); line-height: 1; cursor: pointer; }
  .detail .dh h2 { font-size: 15px; margin: 0 0 2px; word-break: break-word; }
  .detail .dh .da { color: var(--text-dim); font-size: 12px; word-break: break-word; }
  .detail .dbody { padding: 14px 16px; overflow-y: auto; }
  .kv { display: flex; gap: 10px; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .kv .k { color: var(--text-dim); width: 96px; flex: 0 0 96px; }
  .kv .v { font-variant-numeric: tabular-nums; word-break: break-word; }
  .sec-t { font-size: 11px; font-weight: 700; color: var(--text-faint); text-transform: uppercase;
    letter-spacing: .5px; margin: 16px 0 8px; }
  .hist { display: flex; flex-direction: column; gap: 2px; font-size: 12px; }
  .he { display: grid; grid-template-columns: 150px 90px 1fr; gap: 8px; align-items: baseline;
    padding: 3px 0; border-bottom: 1px solid var(--border); }
  .he-t { color: var(--text-faint); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .he-k { font-weight: 700; font-size: 10px; text-transform: uppercase; letter-spacing: .4px; }
  .he-d { color: var(--text-dim); }
  .he-fmt { font-weight: 700; color: var(--text); }
  .he-done { color: var(--green); } .he-failed { color: var(--red); }
  .he-failover, .he-retry { color: var(--amber); }
  .he-downloading { color: var(--accent); } .he-accepted { color: var(--green); }
  .cand { border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin-bottom: 8px; }
  .cand.rec { border-color: var(--amber); background: var(--amber-bg); }
  .cand.best { border-color: var(--accent); }
  .cand .ct { font-weight: 600; }
  .cand .cand-id { font-size: 12px; color: var(--text); margin: 2px 0; }
  .cand .cmeta { color: var(--text-dim); font-size: 12px; margin: 3px 0 7px; display: flex; gap: 8px; flex-wrap: wrap; }
  .cand .cmeta.partpath { align-items: center; gap: 6px; }
  .cand .cmeta.partpath code { font-size: 11px; word-break: break-all; color: var(--text); background: var(--panel-2); padding: 1px 5px; border-radius: 3px; }
  .conf { height: 5px; background: var(--panel-2); border-radius: 3px; overflow: hidden; margin: 7px 0; }
  .conf > i { display: block; height: 100%; background: var(--accent); }
  .cand .cact { display: flex; align-items: center; gap: 8px; }
  .cand .score { margin-left: auto; font-variant-numeric: tabular-nums; color: var(--text-dim); font-size: 12px; }

  /* ---- modal / import sheet ---- */
  .scrim { position: fixed; inset: 0; background: rgba(0,0,0,.32); opacity: 0; pointer-events: none;
    transition: opacity .15s; z-index: 40; }

<script>
/* =====================================================================
   Tauri bridge. When running inside the Tauri webview, window.__TAURI__ is
   present and we drive the REAL libgen-core engine through invoke()/listen():
   a single list is loaded, its per-variation download state is projected from
   the engine's ViewModel, and the per-variation / format-rank / queue actions
   call real commands. When opened directly over file:// (no Tauri), we fall
   back to the bundled multi-list demo data + simulation below, so the UI is
   still fully inspectable and the headless test passes unchanged.
   ===================================================================== */
var TAURI = (typeof window !== "undefined") && window.__TAURI__ ? window.__TAURI__ : null;
function hasTauri() { return !!TAURI; }
function invoke(cmd, args) {
  if (!TAURI || !TAURI.core || !TAURI.core.invoke) return Promise.reject(new Error("no tauri backend"));
  return TAURI.core.invoke(cmd, args || {});
}
function listen(event, cb) {
  if (!TAURI || !TAURI.event || !TAURI.event.listen) return Promise.resolve(function () {});
  return TAURI.event.listen(event, cb);
}

/* =====================================================================
   Demo data — public-domain sample lists.
   Authored inline so the page is fully self-contained over file://, and used
   as a graceful fallback when no Tauri backend is present.
   ===================================================================== */
var BATCHES = [
  ["Lift-Off", [
    ["The Tale of Peter Rabbit","Beatrix Potter"],["Winnie-the-Pooh","A.A. Milne"],
    ["The Velveteen Rabbit","Margery Williams"],["Millions of Cats","Wanda Gag"],
    ["Old Mother West Wind","Thornton W. Burgess"],["The Adventures of Reddy Fox","Thornton W. Burgess"],
    ["Just So Stories","Rudyard Kipling"],["The Story of Doctor Dolittle","Hugh Lofting"],
    ["Raggedy Ann Stories","Johnny Gruelle"],["Uncle Wiggily's Adventures","Howard R. Garis"],
    ["The Reluctant Dragon","Kenneth Grahame"],["The Aesop for Children","Aesop"]
  ]],
  ["Fairy Tales & Folklore", [

  ]],

    ["Ozma of Oz","L. Frank Baum"],["The Adventures of Pinocchio","Carlo Collodi"],
    ["Peter Pan","J.M. Barrie"],["The Princess and the Goblin","George MacDonald"],
    ["Five Children and It","E. Nesbit"],["The Railway Children","E. Nesbit"],
    ["The Enchanted Castle","E. Nesbit"],["The Voyages of Doctor Dolittle","Hugh Lofting"],
    ["The Wind in the Willows","Kenneth Grahame"],["Alice's Adventures in Wonderland","Lewis Carroll"]
  ]],
  ["High Seas & Wilderness", [
    ["Treasure Island","Robert Louis Stevenson"],["Kidnapped","Robert Louis Stevenson"],
    ["The Call of the Wild","Jack London"],["White Fang","Jack London"],
    ["Robinson Crusoe","Daniel Defoe"],["The Swiss Family Robinson","Johann David Wyss"],
    ["The Merry Adventures of Robin Hood","Howard Pyle"],["Around the World in Eighty Days","Jules Verne"],
    ["The Jungle Book","Rudyard Kipling"],["Captains Courageous","Rudyard Kipling"],
    ["The Hound of the Baskervilles","Arthur Conan Doyle"],["The Story of King Arthur and His Knights","Howard Pyle"]
  ]],
  ["Heartfelt Classics", [
    ["Heidi","Johanna Spyri"],["The Secret Garden","Frances Hodgson Burnett"],
    ["A Little Princess","Frances Hodgson Burnett"],["Anne of Green Gables","L.M. Montgomery"],
    ["Little Women","Louisa May Alcott"],["Little Men","Louisa May Alcott"],
    ["The Adventures of Tom Sawyer","Mark Twain"],["The Prince and the Pauper","Mark Twain"],
    ["Black Beauty","Anna Sewell"],["A Christmas Carol","Charles Dickens"],
    ["Pollyanna","Eleanor H. Porter"],["Rebecca of Sunnybrook Farm","Kate Douglas Wiggin"]
  ]]
];

var HOSTS = ["libgen.li", "cdn.booksdl.lc", "ipfs.io"];

/* Two more (smaller) lists so multi-list behavior is visible. Each list is its
   own destination folder with its own settings + progress; they all share the
   one global download engine. */
var LIST2 = ["Mom's Book Club", "classics · 6 books", [
  ["Nonfiction", [
    ["Walden","Henry David Thoreau"],["The Story of My Life","Helen Keller"],
    ["Narrative of the Life of Frederick Douglass","Frederick Douglass"],["The Souls of Black Folk","W. E. B. Du Bois"],
    ["On the Origin of Species","Charles Darwin"],["The Education of Henry Adams","Henry Adams"]
  ]]
]];
var LIST3 = ["Sci-Fi Classics", "all-time · 8 books", [
  ["Foundations", [
    ["The Time Machine","H. G. Wells"],["Twenty Thousand Leagues Under the Sea","Jules Verne"],
    ["Frankenstein","Mary Shelley"],["The War of the Worlds","H. G. Wells"]
  ]],
  ["New Wave", [
    ["A Princess of Mars","Edgar Rice Burroughs"],["The First Men in the Moon","H. G. Wells"],
    ["Flatland","Edwin A. Abbott"],["Journey to the Center of the Earth","Jules Verne"]
  ]]
]];

/* Build one list. Each book has a `discovery` state (queued / matched /
   needs_selection / not_found) and a `versions` array; EACH version has its own
   download `state`, so one book can have the epub done while the pdf downloads.
   `seed` shifts the deterministic scenario so lists look different. */
function buildList(id, title, subtitle, batches, seed) {
  var groups = [], gi = 0;
  for (var b = 0; b < batches.length; b++) {
    var name = batches[b][0], rows = batches[b][1], books = [];
    for (var i = 0; i < rows.length; i++) {
      var n = gi; gi++;
      var sc = pickScenario(seed, b, i);
      var versions = makeVersions(rows[i][0], n);
      var discovery = "matched";
      if (sc === "notfound") { discovery = "not_found"; versions = []; }
      else if (sc === "needs") { discovery = "needs_selection"; }
      else if (sc === "done") { versions[0].state = "done"; }
      else if (sc === "downloading") { versions[0].state = "downloading"; versions[0].progress = 30 + (n * 13) % 55; }
      else if (sc === "multi") { versions[0].state = "done"; versions[1].state = "downloading"; versions[1].progress = 25 + (n * 17) % 50; }
      else if (sc === "failed") { versions[0].state = "failed"; }
      // "queued" leaves all versions available with discovery matched.
      books.push({
        id: id + "/bk" + n, bid: "bk" + n, list: id, title: rows[i][0], author: rows[i][1],
        seq: i + 1, priority: false, discovery: discovery, versions: versions
      });
    }
    groups.push({ name: name, books: books, collapsed: false });
  }
  return { id: id, title: title, subtitle: subtitle, groups: groups, collapsedAll: false };
}

/* Deterministic per-book scenario, distributed for a believable mix. */
function pickScenario(seed, b, i) {
  if (seed === 0) { // Jeremy (large)
    if (b === 0) { if (i === 0) return "multi"; if (i === 2 || i === 9) return "needs"; if (i === 6) return "failed"; if (i < 6) return "done"; if (i < 11) return "downloading"; return "queued"; }
    if (b === 1) { if (i === 3) return "needs"; if (i < 3) return "done"; if (i < 5) return "downloading"; return "queued"; }
    if (b === 2) { if (i < 2) return "done"; return "queued"; }
    if (b === 3) { if (i === 0) return "multi"; if (i === 17) return "needs"; return "queued"; }
    return "queued";
  }
  if (seed === 1) { if (i === 0) return "multi"; if (i === 1) return "needs"; if (i < 4) return "done"; if (i === 4) return "downloading"; return "queued"; }
  if (b === 0) { if (i === 0) return "multi"; if (i < 2) return "done"; if (i === 2) return "downloading"; return "queued"; }
  if (b === 1 && i === 1) return "failed";
  return "queued";
}

/* Kept variations (distinct md5s): Kindle/iPad-friendly formats, size-diverse.
   Each starts `available`; scenarios above flip some to done/downloading/etc. */
function makeVersions(title, n) {
  var defs = [
    { fmt: "epub", size: 2.1, year: 2011, publisher: "Yearling" },
    { fmt: "epub", size: 6.4, year: 2007, publisher: "Scholastic" },
    { fmt: "pdf", size: 9.1, year: 2015, publisher: "Puffin" }
  ];
  return defs.map(function (d, k) {
    return {
      fmt: d.fmt, size: d.size, year: d.year, publisher: d.publisher,
      md5: (((title.length * 7 + k + n) >>> 0).toString(16) + "0000000").slice(0, 8) + "…",
      state: "available", // available | queued | downloading | done | failed
      progress: 0, host: HOSTS[(n + k) % 3]
    };
  });
}

/* A book's effective status (for filters/counts/row), derived from its
   variations' states (the roll-up). */
function effectiveStatus(bk) {
  // "review" = downloaded, but a better match exists (verify); "querying" =
  // search in flight; "needs" = the user must pick; "cantdl" = cannot download.
  if (bk.discovery === "querying") return "querying";
  if (bk.discovery === "not_found") return "cantdl";
  var req = (bk.versions || []).filter(function (v) { return v.state !== "available"; });
  // A live transfer (downloading, or paused mid-transfer) is the most immediate state
  // and wins even over a pending "review"/"needs" flag — a book re-downloading a better
  // copy reads as "Downloading" until it settles. This is what keeps the header's
  // Downloading count equal to the active-downloads panel (which lists every in-flight
  // transfer). A merely QUEUED (pending, not started) variation is NOT "Downloading".
  if (req.some(function (v) { return v.state === "downloading" || v.state === "paused"; })) return "active";
  if (bk.review) return "review";
  if (bk.discovery === "needs_selection" && req.length === 0) return "needs";
  if (req.length === 0) return "queued";
  if (req.every(function (v) { return v.state === "done"; })) return "done";
  if (req.some(function (v) { return v.state === "queued"; })) return "queued";
  // At least one copy succeeded (the rest failed/cancelled) → the book IS
  // downloaded; a failed sibling variation shouldn't mark the whole book failed.
  if (req.some(function (v) { return v.state === "done"; })) return "done";
  if (req.some(function (v) { return v.state === "failed"; })) return "cantdl";
  return "queued";
}

var FMT_GLYPH = { done: "✓", downloading: "⏳", queued: "⏳", failed: "⚠" };

/* Distinct color per file format so the format labels are scannable at a glance. */
var FMT_COLORS = {
  epub: "#2e9e5b", pdf: "#3b7dd8", mobi: "#e07b1a", azw3: "#8a5cd1", azw: "#8a5cd1",
  cbz: "#0e9aa7", cbr: "#0e9aa7", djvu: "#7a6a55", txt: "#5b7083", fb2: "#c2569b"
};
function fmtColor(f) { return FMT_COLORS[(f || "").toLowerCase()] || "var(--text-faint)"; }
function fmtLabel(f) {
  return '<span style="color:' + fmtColor(f) + ';font-weight:700">' + (f || "").toUpperCase() + '</span>';
}

function pad(n) { return (n < 10 ? "0" : "") + n; }

/* =====================================================================
   i18n — UI-chrome localization (book titles/authors are NEVER translated).
   Two surfaces:
     • t(key)      — strings built in JS render functions; re-evaluated every
                     render(), so a language switch re-translates them.
     • [data-i18n] — the static HTML skeleton; applyStaticI18n() rewrites those
                     nodes on load + on every language change.
   Add a key to BOTH `en` and `zh`. t() falls back en → key, so a missing
   translation degrades gracefully rather than blanking the UI.
   ===================================================================== */
var I18N = {
  en: {
    /* sidebar */
    "side.library": "Library",
    "side.all_downloads": "All downloads",
    /* empty state */
    "empty.side": "No lists yet.",
    "empty.title": "No lists yet",
    "empty.sub": "Import a Markdown/JSON file, or add a book, to get started.",
    "empty.nothing_yet": "Nothing to download yet.",
    "empty.import_prompt": "＋ Import a list",
    "empty.filter": "Nothing here for this filter.",
    /* toolbar */
    "toolbar.import": "＋ Import files",
    "toolbar.start_all": "▶ Start downloading for all lists",
    "toolbar.stop_all": "❚❚ Stop all",
    "toolbar.done_of": "done",

/* The ranked preferred-format control: epub › pdf › mobi, reorderable with the
   ▲/▼ buttons. Order = priority (the matcher prefers earlier formats). Lives in
   the Settings sheet (per-list "Preferred formats"). */
function renderFormatRank() {
  var el = document.getElementById("fmtRank");
  if (!el) return;
  var html = '<div class="frank-row">';
  FORMATS.forEach(function (f, i) {
    if (i > 0) html += '<span class="sep">›</span>';
    html += '<span class="frank"><span class="rk">' + (i + 1) + '</span>' + f.toUpperCase() +
      '<button class="mv" data-fmtmv="' + i + ':up" title="' + esc(t("settings.rank_higher")) + '"' + (i === 0 ? " disabled" : "") + '>▲</button>' +
      '<button class="mv" data-fmtmv="' + i + ':down" title="' + esc(t("settings.rank_lower")) + '"' + (i === FORMATS.length - 1 ? " disabled" : "") + '>▼</button>' +
      '<button class="mv rm" data-fmtrm="' + f + '" title="' + esc(t("settings.remove")) + '"' + (FORMATS.length <= 1 ? " disabled" : "") + '>×</button>' +
      '</span>';
  });
  html += '</div>';
  var pool = (SHOW_ALL_FORMATS ? ALL_FORMATS : DEVICE_FORMATS).filter(function (f) { return FORMATS.indexOf(f) < 0; });
  html += '<div class="frank-add">';
  if (pool.length) {
    html += '<span class="add-lbl">' + esc(t("settings.formats_add")) + '</span>';
    pool.forEach(function (f) { html += '<button class="addchip" data-fmtadd="' + f + '">+ ' + f.toUpperCase() + '</button>'; });
  } else {
    html += '<span class="add-lbl" style="opacity:.6">' + esc(SHOW_ALL_FORMATS ? t("settings.all_formats_added") : t("settings.all_device_formats_added")) + '</span>';
  }
  html += '<button class="addchip ghost" data-fmtshowall="1">' + esc(SHOW_ALL_FORMATS ? t("settings.show_fewer") : t("settings.show_all_formats")) + '</button>';
  html += '</div>';
  html += '<div class="hint" style="margin-top:5px">' + t("settings.formats_default_hint") + '</div>';
  el.innerHTML = html;
}

/* The "Mirror health" panel: per-site up/down · ping · 24h uptime, grouped by
   SLUM group, populated on demand by the `refresh-mirrors` action. */
function mirrorRefreshedNote() {
  if (MIRROR_HEALTH_ERR) return '<div class="mirror-note" style="color:#c0392b">' + esc(t("settings.refresh_failed")) + esc(MIRROR_HEALTH_ERR) + '</div>';
  if (MIRROR_HEALTH_AT) return '<div class="mirror-note">' + esc(t("settings.last_refreshed")) + esc(fmtEventTime(MIRROR_HEALTH_AT)) + '</div>';
  return '';
}
function renderMirrorHealth() {
  var el = document.getElementById("mirrorHealth");
  if (!el) return;
  if (!MIRROR_HEALTH.length) {
    el.innerHTML = mirrorRefreshedNote() + '<div class="mirror-note">' +
      esc(MIRROR_HEALTH_BUSY ? t("settings.fetching_status")
        : t("settings.click_refresh")) + '</div>';
    return;
  }
  // Group rows by their SLUM group, preserving first-seen order.
  var order = [], byGroup = {};
  MIRROR_HEALTH.forEach(function (s) {
    if (!byGroup[s.group]) { byGroup[s.group] = []; order.push(s.group); }
    byGroup[s.group].push(s);
  });
  var html = mirrorRefreshedNote();
  order.forEach(function (g) {
    html += '<div class="mh-group">' + esc(g) + '</div>';
    byGroup[g].forEach(function (s) {
      var dot = s.up ? '🟢' : '🔴';
      var bits = [];
      if (s.ping_ms != null) bits.push(s.ping_ms + ' ms');
      if (s.uptime_24h != null) bits.push(Math.round(s.uptime_24h * 100) + '% 24h');
      html += '<div class="mh-row"><span class="mh-dot">' + dot + '</span>' +
        '<span class="mh-host">' + esc(s.host) + '</span>' +
        '<span class="mh-meta">' + esc(bits.join(' · ')) + '</span></div>';
    });
  });
  el.innerHTML = html;
}

/* Move already-downloaded files into the current folder/seq layout. */
/* Shorten an absolute path to its last few components (…/<list>/<group>/<file>)
   so the reorganize diff stays readable; the full path is shown on hover. */
function shortPath(p) {
  var parts = String(p || "").split("/").filter(Boolean);
  return (parts.length > 3 ? "…/" : "") + parts.slice(-3).join("/");
}

/* Toggle the reorganize "Details" list: load the exact from→to pairs on show. */
function onReorganizeDetails() {
  if (REORG_DIFF) { REORG_DIFF = null; renderSettings(); return; }
  if (!hasTauri()) { REORG_DIFF = []; renderSettings(); return; }
  invoke("reorganize_diff")
    .then(function (pairs) { REORG_DIFF = Array.isArray(pairs) ? pairs : []; renderSettings(); })
    .catch(function (err) { toast("Couldn't load details: " + (errText(err) || "unknown error")); });
}

/* Move all leftover .part files to Trash (incomplete/abandoned downloads). */
function onCleanupParts(btn) {
  var status = document.getElementById("partStatus");
  if (!hasTauri()) { if (status) status.textContent = t("misc.app_only"); return; }
  if (btn) { btn.disabled = true; btn.textContent = t("settings.cleaning"); }
  if (status) status.textContent = t("misc.moving_parts");
  invoke("cleanup_part_files")
    .then(function (summary) { if (status) status.textContent = summary || t("misc.done"); })
    .catch(function (e) { if (status) status.textContent = t("misc.failed_prefix") + (e && (e.message || e)); })
    .then(function () { if (btn) { btn.disabled = false; btn.textContent = t("settings.cleanup_btn"); } });
}

function onReorganizeFiles(btn) {
  var status = document.getElementById("reorgStatus");
  if (!hasTauri()) { if (status) status.textContent = t("misc.app_only"); return; }
  if (btn) { btn.disabled = true; btn.textContent = t("settings.reorganizing"); }
  if (status) status.textContent = t("misc.reorganizing");
  invoke("reorganize_files")
    .then(function (summary) {
      if (status) status.textContent = summary || t("misc.done");
      REORG_DIFF = null; // the moves just happened — the old diff is stale
      // Refresh the library so revealed paths reflect the moves.
      if (hasTauri()) invoke("library").then(applyLibrary).catch(function () {});
      // Re-check: after a successful pass the count should drop (→ gray the button).
      if (hasTauri()) invoke("reorganize_needed").then(function (n) { REORG_COUNT = n | 0; renderSettings(); }).catch(function () {});
    })
    .catch(function (e) {
      if (status) status.textContent = t("misc.failed_prefix") + (e && (e.message || e));
    })
    .then(function () {
      if (btn && REORG_COUNT > 0) { btn.disabled = false; btn.textContent = t("settings.reorganize_now") + " (" + REORG_COUNT + ")"; }
    });
}

/* Fetch live mirror availability from SLUM and re-render the health panel. */
function onRefreshMirrors() {
  if (MIRROR_HEALTH_BUSY) return;
  if (!hasTauri()) { MIRROR_HEALTH = []; renderMirrorHealth(); return; }
  MIRROR_HEALTH_BUSY = true;
  MIRROR_HEALTH_ERR = "";
  // Re-rendering the sheet would clobber in-progress edits, so capture the current
  // input values first, then re-render with them preserved.
  collectSettings();
  renderSettings();
  invoke("refresh_mirrors")
    .then(function (sites) {
      MIRROR_HEALTH = sites || [];
      MIRROR_HEALTH_AT = Date.now();        // stamp the successful refresh
      MIRROR_HEALTH_ERR = "";
    })
    .catch(function (e) {
      // Surface the failure instead of swallowing it (it used to fail silently).
      MIRROR_HEALTH = [];
      MIRROR_HEALTH_ERR = (e && (e.message || e)) ? String(e.message || e) : "could not reach open-slum.org";
      console.error("refresh_mirrors failed:", e && (e.message || e));
    })
    .then(function () { MIRROR_HEALTH_BUSY = false; collectSettings(); renderSettings(); });
}

function renderFilters() {
  // Chip counts use the SAME category test as the filter (inCategory), so a Done+Failed
  // book is counted under both "Done" and "Cannot download" — matching what clicking the
  // chip shows. (The toolbar progress bar still uses the single-status partition.)
  var books = (CURRENT === "__all__" ? everyBook() : listBooks(currentList()));
  // Per-SELECTED-VARIATION counts: a book's copies are counted independently, so a book
  // with a Done copy AND an in-progress (or queued/failed) copy is counted under EACH —
  // done+active+queued+cantdl sums to the number of selected variations. needs/review are
  // book-level (a book that has no selected variation in the download lifecycle yet).
  var c = { all: books.length, needs: 0, review: 0, cantdl: 0, active: 0, done: 0, queued: 0 };
  books.forEach(function (b) {
    var es = effectiveStatus(b);
    if (es === "needs") c.needs++;
    if (es === "review") c.review++;
    var n = 0, failed = 0;
    requestedVersions(b).forEach(function (v) {
      if (v.state === "done") { c.done++; n++; }
      else if (v.state === "downloading" || v.state === "paused") { c.active++; n++; }
      else if (v.state === "queued") { c.queued++; n++; }
      else if (v.state === "failed") { c.cantdl++; n++; failed++; }
    });
    // "Cannot download" must include NOT-FOUND books too: those have no candidates (no
    // variation to count above), so count the book once when it rolls up to cantdl and
    // had no failed variation already counted. (A book with a Done copy + a Failed copy
    // is still counted via its failed variation above, exactly like the filter shows.)
    if (es === "cantdl" && failed === 0) c.cantdl++;
    if (n === 0 && es === "queued") c.queued++; // queued for query — no variation yet
  });
  var el = document.getElementById("filters");
  function chip(key, label, n) {
    var extra = (key === "needs" || key === "review") ? " attn" : (key === "cantdl" ? " cantdl" : "");
    return '<button class="chip' + extra + (FILTER === key ? " active" : "") + '" data-filter="' + key + '">' +
      esc(label) + (n != null ? ' <span class="n">' + n + '</span>' : '') + '</button>';
  }
  var fmts = formatsInView();
  var fmtChips = fmts.length
    ? '<span style="opacity:.4;margin:0 4px">|</span>' + fmts.map(function (f) {
        return '<button class="chip' + (FMT_FILTER === f ? " active" : "") + '" data-fmtfilter="' + f +
          '" title="Show only books with a ' + f.toUpperCase() + ' copy" style="color:' + fmtColor(f) +
          (FMT_FILTER === f ? ";border-color:" + fmtColor(f) : "") + '">' + f.toUpperCase() + '</button>';
      }).join("")
    : "";
  el.innerHTML =
    chip("all", t("filter.all"), c.all) +
    chip("needs", t("filter.needs"), c.needs) +
    chip("review", t("filter.review"), c.review) +
    chip("cantdl", t("filter.cantdl"), c.cantdl) +
    chip("active", t("filter.active"), c.active) +
    chip("done", t("filter.done"), c.done) +
    chip("queued", t("filter.queued"), c.queued) +
    fmtChips;
}

function groupHeader(key, name, doneN, total, collapsed) {
  return '<div class="group-h' + (collapsed ? " collapsed" : "") + '" data-toggle="' + key + '">' +
    '<span class="tw">▾</span><span class="gname">' + esc(name) + '</span>' +
    '<span class="gcount">' + doneN + " / " + total + '</span></div>';
}
function renderList() {
  var wrap = document.getElementById("listwrap");
  var html = "", shown = 0;
  if (CURRENT === "__all__") {
    // Aggregate: one collapsible section per list.
    LISTS.forEach(function (l, li) {
      var books = listBooks(l), visible = books.filter(matchesFilter);
      if (visible.length === 0) return;
      var doneN = books.filter(function (b) { return effectiveStatus(b) === "done"; }).length;
      html += groupHeader("L" + li, l.title, doneN, books.length, l.collapsedAll);
      if (!l.collapsedAll) visible.forEach(function (bk) { shown++; html += bookRow(bk); });
    });
  } else {
    // Single list: one collapsible section per batch.
    currentList().groups.forEach(function (g, gi) {
      var visible = g.books.filter(matchesFilter);
      if (visible.length === 0) return;
      var doneN = g.books.filter(function (b) { return effectiveStatus(b) === "done"; }).length;
      html += groupHeader("G" + gi, g.name, doneN, g.books.length, g.collapsed);
      if (!g.collapsed) visible.forEach(function (bk) { shown++; html += bookRow(bk); });
    });
  }
  if (shown === 0) html = '<div class="empty">' + esc(t("empty.filter")) + '</div>';
  // Diff-guard: only touch the DOM when the (progress-free) markup actually changed,
  // so a reload that finds nothing structurally different doesn't re-replace the list
  // (re-decoding covers, flickering). Live download bars are filled in place below.
  if (wrap.__ph !== html) { wrap.__ph = html; wrap.innerHTML = html; }
  updateRowProgress();
}

/* Fill the live download bar + % on each active row IN PLACE — no list rebuild, so
   progress ticks smoothly without flicker. Called from renderLive() (≤4 fps) and after
   each renderList(). */
function updateRowProgress() {
  // Per-VARIATION bars: each downloading variation line carries data-vprog="bookId:md5".
  var nodes = document.querySelectorAll("#listwrap [data-vprog]");
  if (!nodes.length) return;
  var byId = {};
  everyBook().forEach(function (b) { byId[b.id] = b; });
  nodes.forEach(function (el) {
    var dp = el.getAttribute("data-vprog"); var sep = dp.indexOf(":");
    var bk = byId[dp.slice(0, sep)]; if (!bk) return;
    var md5 = dp.slice(sep + 1);
    var v = (bk.versions || []).filter(function (x) { return x.md5 === md5; })[0];
    if (!v) return;
    var pct = v.state === "done" ? 100 : (v.progress || 0);
    var bar = el.querySelector(".vbar i"); if (bar) bar.style.width = pct + "%";
    var pc = el.querySelector(".vpct"); if (pc) pc.textContent = pct + "%";
  });
}

function requestedVersions(bk) { return (bk.versions || []).filter(function (v) { return v.state !== "available"; }); }
function rollup(bk) {
  var req = requestedVersions(bk);
  return { requested: req.length, done: req.filter(function (v) { return v.state === "done"; }).length };
}
function uniqueFormats(versions) {
  var seen = {}, out = [];
  (versions || []).forEach(function (v) { if (!seen[v.fmt]) { seen[v.fmt] = 1; out.push(v.fmt); } });
  return out;
}

/* A representative file size for the book's row: prefer the downloaded copy, then
   the recommended one, then the top candidate. "" when no candidate has a size. */
function bookSize(bk) {
  var vs = bk.versions || [];
  var v = vs.filter(function (x) { return x.state === "done"; })[0]
    || vs.filter(function (x) { return x.md5 === bk.recommended_md5; })[0]
    || vs[0];
  return (v && v.size) ? (v.size + " MB") : "";
}

/* Cover image URL for the book: downloaded copy → recommended → any with a cover. */
/* The cover the book SHOULD show for its current state (done → recommended → any). */
function preferredCover(bk) {
  var vs = (bk.versions || []).filter(function (x) { return x.cover_url; });
  if (!vs.length) return "";
  return (vs.filter(function (x) { return x.state === "done"; })[0]
    || vs.filter(function (x) { return x.md5 === bk.recommended_md5; })[0]
    || vs[0]).cover_url;
}
/* The cover URL to DISPLAY right now — "load in background, swap when ready". Show the
   PREFERRED cover only once it's loadable; until then keep showing the last cover we
   actually displayed for this book (sticky in LAST_COVER + the never-evicted
   COVER_CACHE, so it survives a cover_url re-localize) — never flashing a placeholder.
   hydrateCovers fetches the preferred in the background; once cached, the next render
   swaps to it. This is the "cover disappears while downloading" fix. */
function bookCover(bk) {
  var key = bk.id || bk.bid;
  var pref = preferredCover(bk);
  if (coverSrc(pref)) { if (key) LAST_COVER[key] = pref; return pref; }
  var last = key ? LAST_COVER[key] : "";
  if (last && coverSrc(last)) return last;
  var alt = (bk.versions || []).filter(function (x) { return x.cover_url && coverSrc(x.cover_url); })[0];
  if (alt) { if (key) LAST_COVER[key] = alt.cover_url; return alt.cover_url; }
  return pref; // nothing loadable yet → placeholder until the background fetch lands
}
/* A cover <img> (lazy; swaps to a format-colored placeholder on 404), or the
   placeholder directly when no cover URL is known. `cls` = "cv-sm" | "cv-lg". */
function coverImg(bk, cls) {
  // A not-found / can't-download book has no file — show a NEUTRAL placeholder, never
  // a format-colored one (a leftover format from a removed/wrong variation is
  // misleading) and never a stale cover image.
  if (effectiveStatus(bk) === "cantdl") {
    return '<span class="cover ' + cls + ' cover-ph" style="color:var(--text-faint)">—</span>';
  }
  var fmts = uniqueFormats(bk.versions), f = fmts[0] || "";
  var ph = '<span class="cover ' + cls + ' cover-ph" style="background:' + fmtColor(f) +
    '22;color:' + fmtColor(f) + '">' + esc((f || "?").toUpperCase().slice(0, 4)) + '</span>';
  var raw = bookCover(bk);
  var url = coverSrc(raw);
  // OBSERVABILITY: log the exact moment a book that WAS showing a cover drops to the
  // placeholder, with enough state to decide the cause from one line — did the
  // cover_url change (was!=now), is the new path a cache MISS (cached:false), or did
  // it permanently fail to fetch (fails>=max)? If was==now, cached:true, fails:0, the
  // cause is render/lazy-decode, not the data. (Reported: tail-end, long-ago downloads.)
  var ckey = bk.id || bk.bid;
  if (url) { if (ckey) COVER_SHOWN[ckey] = raw; }
  else if (ckey && COVER_SHOWN[ckey]) {
    try {
      console.warn("cover→placeholder", { book: bk.title, was: COVER_SHOWN[ckey], now: raw || null,
        cached: raw ? (COVER_CACHE[raw] !== undefined) : null, fails: raw ? (COVER_FAILS[raw] || 0) : 0 });
    } catch (e) {}
    delete COVER_SHOWN[ckey];
  }
  if (!url) return ph;
  // loading="lazy" + decoding="async": a long list re-rendered during downloads must
  // NOT synchronously decode every off-screen cover data-URL (that clogs the decode
  // queue and makes covers lag / flicker). Off-screen covers decode when scrolled in.
  return '<img class="cover ' + cls + '" loading="lazy" decoding="async" src="' + esc(url) + '" ' +
    "onerror=\"this.outerHTML='" +
    ph.replace(/'/g, "&#39;").replace(/"/g, "&quot;") + "'\">";
}

/* Resolve a cover value to a usable <img src>. Remote http(s) URLs are used as-is;
   a LOCAL absolute path (a cached thumbnail) is served through Tauri's asset
   protocol via convertFileSrc so the webview can load it. */
function coverSrc(url) {
  if (!url) return "";
  if (/^https?:/i.test(url)) return url; // remote: load directly
  // Local cached thumbnail: use the data URL once hydrateCovers has fetched it
  // (empty string → placeholder until then, or if it failed).
  var c = COVER_CACHE[url];
  return (typeof c === "string" && c) ? c : "";
}
/* The per-format glyph strip: each REQUESTED variation as `fmt<glyph>` colored
   by its own state. Before any download, show the available formats faintly. */
function variationGlyphs(bk) {
  // A cancelled variation was abandoned by the user (e.g. dropped in favor of a
  // better copy) — don't keep showing it as an active chip in the list row. It
  // stays visible in the detail variation manager (re-downloadable).
  var req = requestedVersions(bk).filter(function (v) { return v.state !== "cancelled"; });
  if (req.length === 0) {
    return uniqueFormats(bk.versions).map(function (f) { return '<span class="fmt" style="color:' + fmtColor(f) + '">' + f + '</span>'; }).join(" ");
  }
  return req.map(function (v) {
    // Format → text color; download state → background tint (vg-*) + trailing glyph.
    var cls = v.state === "done" ? "vg-done" : (v.state === "failed" ? "vg-fail" : "vg-active");
    return '<span class="vg ' + cls + '" style="color:' + fmtColor(v.fmt) + '">' +
      v.fmt + " " + (FMT_GLYPH[v.state] || "") + '</span>';
  }).join(" ");
}

/* Overall download percent across a book's requested variations (done = 100). */
function downloadPct(bk) {
  var r = requestedVersions(bk);
  if (!r.length) return 0;
  var s = 0;
  r.forEach(function (v) { s += v.state === "done" ? 100 : (v.progress || 0); });
  return Math.round(s / r.length);
}

/* One variation's status cell. An ANIMATED hourglass = actively downloading; a
   still hourglass = queued/waiting — so the two are visually distinct. */
function varStatusCell(v) {
  if (v.state === "done") return '<span class="vstat" style="color:var(--green)">' + esc(t("vstat.done")) + '</span>';
  if (v.state === "downloading")
    return '<span class="vstat" style="color:var(--accent)"><span class="hourglass run">⏳</span> <span class="vpct">…</span></span>';
  if (v.state === "paused")
    return '<span class="vstat">' + esc(t("vstat.paused")) + (v.progress ? ' ' + v.progress + '%' : '') + '</span>';
  if (v.state === "failed") return '<span class="vstat" style="color:var(--red)">' + esc(t("vstat.failed")) + '</span>';
  if (v.state === "queued") return '<span class="vstat"><span class="hourglass">⏳</span> ' + esc(t("vstat.queued")) + '</span>';
  return '<span class="vstat">' + esc(v.state) + '</span>';
}
/* One variation's progress bar. Live (downloading) rows bake width:0% so the list
   markup stays STABLE byte-to-byte (the diff-guard skips the rebuild); the live %
   is filled in place by updateRowProgress on the [data-vprog] line. */
function varProgCell(v) {
  if (v.state === "done") return '<span class="vbar"><i style="width:100%;background:var(--green)"></i></span>';
  if (v.state === "downloading") return '<span class="vbar"><i style="width:0%"></i></span>';
  if (v.state === "paused") return '<span class="vbar"><i style="width:' + (v.progress || 0) + '%"></i></span>';
  return '<span class="vbar empty"></span>';
}
function varLine(bk, v) {
  var dp = v.state === "downloading" ? ' data-vprog="' + esc(bk.id) + ":" + esc(v.md5) + '"' : '';
  // Too-few-pages guard: a verified file with a suspiciously low page count is likely
  // a sample/wrong/corrupt copy — flag it (the file is kept; this is a warning).
  var warn = v.low_pages
    ? '<span class="vwarn" title="' + esc("Only " + v.counted_pages + " pages — " + t("vm.low_pages_title")) + '">⚠ ' + v.counted_pages + 'p</span>'
    : '';
  return '<div class="vline"' + dp + '>' +
    '<span class="vt" style="color:' + fmtColor(v.fmt) + '">' + esc(v.fmt) + '</span>' +
    '<span class="vsz">' + (v.size ? v.size + ' MB' : '—') + '</span>' +
    varStatusCell(v) + warn + varProgCell(v) + '</div>';
}
/* The per-variation region of a book row: one line per REQUESTED variation
   (type · size · status · progress, stacked vertically). A book with no requested
   variation (querying / needs / not-found / queued-for-query) shows one book-level
   status line instead. */
function variationLines(bk) {
  var req = requestedVersions(bk).filter(function (v) { return v.state !== "cancelled"; });
  if (req.length === 0) {
    var es = effectiveStatus(bk), txt, cls;
    if (es === "querying") { txt = '<span class="hourglass run">⟳</span> ' + esc(t("book.being_queried")); cls = "s-active"; }
    else if (es === "needs") { txt = esc(t("book.choose_copy")); cls = "s-attn"; }
    else if (es === "review") { txt = esc(t("book.check_download")); cls = "s-attn"; }
    else if (es === "cantdl") { txt = esc(bk.discovery === "not_found" ? t("book.not_found") : t("book.failed")); cls = "s-fail"; }
    else { txt = esc(bk.priority ? t("book.next_up") : t("book.queued_query")); cls = bk.priority ? "s-active" : "s-queued"; }
    return '<div class="vlist"><div class="vline bookline"><span class="chip-s ' + cls + '">' + txt + '</span></div></div>';
  }
  return '<div class="vlist">' + req.map(function (v) { return varLine(bk, v); }).join("") + '</div>';
}
/* The optional book-level action button (Choose / Review / Top), shown in the
   row's action column. Empty otherwise. */
function rowAction(bk) {
  var es = effectiveStatus(bk);
  if (es === "needs") return '<button class="rowbtn amber" data-open="' + bk.id + '">' + esc(t("rowbtn.choose")) + '</button>';
  if (es === "review") return '<button class="rowbtn amber" data-open="' + bk.id + '">' + esc(t("rowbtn.review")) + '</button>';
  if (es === "queued" && (bk.versions && bk.versions.length)) {
    return '<button class="rowbtn' + (bk.priority ? " amber" : "") + '" data-top="' + bk.id +
      '" title="' + esc(t("detail.move_top")) + '">' + esc(bk.priority ? t("rowbtn.top_on") : t("rowbtn.top")) + '</button>';
  }
  return '<span></span>';
}

/* The book's list meta line: author · year (page count is detail-only — space is
   tight here and the year is what readers scan for). Auto-filled author/year
   (back-filled from the downloaded copy, not user-entered) are subtly marked. */
function autoMark(s) { return '<span class="bf" title="' + esc(t("misc.autofill_title")) + '">' + s + '</span>'; }
function bookMetaLine(bk) {
  var bf = bk.backfilled || [], parts = [];
  if (bk.author) parts.push(bf.indexOf("authors") >= 0 ? autoMark(esc(bk.author)) : esc(bk.author));
  if (bk.year != null) parts.push(bf.indexOf("year") >= 0 ? autoMark(String(bk.year)) : String(bk.year));
  return parts.join(" · ") || esc(bk.author || "");
}
function bookRow(bk) {
  return '<div class="book' + (SELECTED === bk.id ? " sel" : "") + '" data-open="' + bk.id + '">' +
    '<span class="seq">' + bk.seq + '</span>' +
    coverImg(bk, "cv-sm") +
    '<span class="meta"><div class="t">' + esc(bk.title) + '</div><div class="a">' + bookMetaLine(bk) + '</div></span>' +
    variationLines(bk) + rowAction(bk) + '</div>';
}

function fmtBytes(n) {
  if (n == null) return "—";
  if (n >= 1048576) return (n / 1048576).toFixed(1) + " MB";
  if (n >= 1024) return (n / 1024).toFixed(0) + " KB";
  return n + " B";
}
function fmtSpeed(bps) { return bps == null ? "—" : fmtBytes(bps) + "/s"; }
function fmtEta(secs) {
  if (secs == null) return "—";
  if (secs >= 3600) return Math.floor(secs / 3600) + "h " + Math.floor((secs % 3600) / 60) + "m";
  if (secs >= 60) return Math.floor(secs / 60) + "m " + (secs % 60) + "s";
  return secs + "s";
}

/* The bottom panel: everything in flight right now — books being queried, and
   variations being downloaded (with progress, speed, ETA). Collapsible. */
/* Per-leg live download state for the active panel. One variation (md5) may run
   several LEGS at once — the primary plus speculative hedge legs. Each per-leg
   event carries an authoritative `leg_id` (primary=0, hedges 1,2,… in start order)
   and `is_hedge`, so we key by leg_id — NOT host. A leg that changes host (failover
   or cdn edge-rotation) keeps its leg_id → stays ONE line; only a real hedge adds
   one. A leg is removed on its explicit `leg_ended`; the whole md5 clears on a
   terminal (done/failed/cancelled). LEG_TTL is a 60s BACKSTOP only — every per-leg
   event (incl. liveness: stalled/retrying/resuming) refreshes the leg, so an
   alive-but-silent leg (TTFB) is never dropped. See docs/LEG_LIFECYCLE.md. */
var LEGS = {};                 // md5 -> { byLeg: { leg_id -> leg } }
var LEG_TTL = 60000;           // ms; pure backstop for a lost leg_ended (not a liveness timer)

function noteLeg(p) {
  if (!p.md5) return;
  // Whole-download terminals clear every leg for the md5.
  if (p.kind === "done" || p.kind === "failed" || p.kind === "cancelled") { delete LEGS[p.md5]; return; }
  // One specific leg ended → remove just it; survivors remain (a lower one ending
  // promotes the next as primary by leg_id order).
  if (p.kind === "leg_ended") {
    var Le = LEGS[p.md5];
    if (Le) { delete Le.byLeg[p.leg_id]; if (!Object.keys(Le.byLeg).length) delete LEGS[p.md5]; }
    return;
  }
  // Every other per-leg event carries leg_id and acts as a keep-alive. `failing_over`
  // has no new host (only from_host), so it just refreshes the leg until the next
  // `resolved` lands the new host on the SAME leg_id.
  if (p.leg_id == null) return;
  var L = LEGS[p.md5] || (LEGS[p.md5] = { byLeg: {} });
  var prev = L.byLeg[p.leg_id];
  var prog = (p.total_bytes != null && p.bytes_done != null)
    ? Math.min(100, Math.round(100 * p.bytes_done / p.total_bytes))
    : (prev ? prev.progress : 0);
  L.byLeg[p.leg_id] = {
    leg_id: p.leg_id,
    host: (p.host != null ? p.host : (prev ? prev.host : null)),
    bytes: (p.bytes_done != null ? p.bytes_done : (prev ? prev.bytes : null)),
    total: (p.total_bytes != null ? p.total_bytes : (prev ? prev.total : null)),
    speed: (p.kind === "bytes" ? (p.speed_bps != null ? p.speed_bps : null) : (prev ? prev.speed : null)),
    eta: (p.kind === "bytes" ? (p.eta_secs != null ? p.eta_secs : null) : (prev ? prev.eta : null)),
    is_hedge: (p.is_hedge != null ? p.is_hedge : (prev ? prev.is_hedge : false)),
    progress: prog,
    ts: Date.now(),
  };
}

/* The legs to show for a downloading variation: live per-leg state when we have it,
   else ONE leg synthesized from the viewmodel (no events yet). Legs are ordered by
   leg_id (= start order); the lowest LIVE leg_id is the PRIMARY, the rest badged
   hedge — so when the primary's leg ends, the next-earliest survivor promotes. */
function legsFor(v) {
  var L = LEGS[v.md5], now = Date.now();
  if (L) {
    var ids = Object.keys(L.byLeg).map(Number)
      .filter(function (id) { return (now - (L.byLeg[id].ts || 0)) < LEG_TTL; })
      .sort(function (a, b) { return a - b; });
    if (ids.length) {
      return ids.map(function (id, i) { var leg = L.byLeg[id]; leg.hedge = i > 0; return leg; });
    }
  }
  return [{ host: v.host, bytes: v.downloaded_bytes, total: v.total_bytes,
    speed: v.speed_bps, eta: v.eta_secs, progress: v.progress, hedge: false }];
}

/* The PRIMARY leg for an md5 = the live leg with the lowest leg_id (earliest start).
   The variation's headline progress tracks the primary, so it never flips to a
   hedge; when the primary's leg ends, the next-earliest survivor takes over.
   Returns null if no live legs. */
function primaryLeg(md5) {
  var L = LEGS[md5]; if (!L) return null;
  var now = Date.now(), best = null;
  Object.keys(L.byLeg).forEach(function (k) {
    var leg = L.byLeg[k];
    if ((now - (leg.ts || 0)) >= LEG_TTL) return;
    if (!best || leg.leg_id < best.leg_id) best = leg;
  });
  return best;
}

function renderActivePanel() {
  var panel = document.getElementById("activePanel");
  panel.classList.toggle("collapsed", ACTIVE_COLLAPSED);

  var querying = [], downloading = [], seenMd5 = {};
  everyBook().forEach(function (b) {
    if (b.discovery === "querying") querying.push(b);
    (b.versions || []).forEach(function (v) {
      if (v.state !== "downloading" && v.state !== "paused") return;
      // One row per md5: the same file selected by two book entries (e.g. a book
      // duplicated across lists, or a mistaken same-file selection) is ONE underlying
      // download job — show it once, not as two rows that share progress and flicker.
      // The top "in progress" chip stays per-variation, so its count may exceed the
      // rows here; that discrepancy is expected and acceptable.
      if (v.md5) { if (seenMd5[v.md5]) return; seenMd5[v.md5] = true; }
      downloading.push({ bk: b, v: v });
    });
  });

  // Expand each downloading variation into its LEGS — with hedging on, one variation
  // races on several hosts, each shown on its OWN line (hedge legs badged).
  var legList = [];
  downloading.forEach(function (d) {
    legsFor(d.v).forEach(function (leg) { legList.push({ bk: d.bk, v: d.v, leg: leg }); });
  });
  // A leg is actively TRANSFERRING once it lands on a cdn edge (host recorded after
  // the 307) OR bytes measurably flow; otherwise it's still CONNECTING (on the mirror).
  function legTransferring(v, leg) {
    return v.state === "downloading" &&
      (/\.booksdl\.lc$/.test(leg.host || "") || (leg.speed || 0) > 0);
  }
  var active = 0, connecting = 0, paused = 0;
  legList.forEach(function (item) {
    if (item.v.state === "paused") paused++;
    else if (legTransferring(item.v, item.leg)) active++;
    else connecting++;
  });
  // "downloading" = actively transferring bytes (from a capped cdn edge). Everything
  // BEFORE bytes flow — resolving the mirror, following the 307, opening the stream — is
  // counted as CONNECTING. Connecting is uncapped (bounded only by total download
  // concurrency), so it is deliberately NOT folded into the "downloading" number.
  document.getElementById("apSummary").textContent =
    querying.length + " " + t("ap.querying_sum") + " · " + active + " " + t("ap.downloading_sum") +
    (connecting ? " · " + connecting + " " + t("ap.connecting_sum") : "") +
    (paused ? " · " + paused + " " + t("ap.paused_sum") : "");

  // Per-host slots: filled by ACTIVELY-transferring legs (capped at the host
  // concurrency); connecting/paused legs shown as a parenthetical, not as "on" slots.
  // Slots shown per host = the PER-EDGE concurrency cap (download::MAX_CONCURRENT_PER_EDGE),
  // since downloads are grouped by the cdnN edge serving them — not the global cap.
  // The slot-dots header is ONLY for the capped cdn edges that are actively serving
  // bytes. Connecting legs sit on the uncapped mirror (no per-host slot), so they're
  // excluded here — they appear per-task in the rows below ("connecting via …").
  var byHost = {}, cap = 3;
  legList.forEach(function (item) {
    // ONLY legs that landed on a capped cdn edge hold a per-edge slot. A leg still on the
    // mirror (connecting) holds no permit — exclude it from the slot dots regardless of
    // its byte count (which is just the resume offset of a partial).
    if (!/\.booksdl\.lc$/.test(item.leg.host || "")) return;
    (byHost[item.leg.host] || (byHost[item.leg.host] = { active: 0 })).active++;
  });
  document.getElementById("apHosts").innerHTML = Object.keys(byHost).map(function (h) {
    var b = byHost[h], slots = "", taken = Math.min(b.active, cap);
    for (var i = 0; i < cap; i++) slots += '<i class="' + (i < taken ? "on" : "") + '"></i>';
    return '<span class="host"><span class="slots">' + slots + '</span>' + esc(h) +
      ' <span style="opacity:.7">' + b.active + "/" + cap + '</span></span>';
  }).join("");

  if (ACTIVE_COLLAPSED) return; // body hidden — skip building it

  var html = '<div class="ap-sec">' + esc(t("ap.being_queried_sec")) + ' (' + querying.length + ')</div>';
  if (!querying.length) html += '<div class="ap-empty">' + esc(t("ap.nothing_queried")) + '</div>';
  querying.forEach(function (b) {
    html += '<div class="ap-row"><span class="nm">' + esc(b.title) +
      ' <small>' + esc(b.author) + '</small></span>' +
      '<span class="ap-bar"><i style="width:40%"></i></span>' +
      '<span class="ap-stats">' + esc(t("ap.searching")) + '</span></div>';
  });

  // List every active leg with WHAT it's doing: the mirror it's on, and either
  // "connecting…" (slot held, resolving/opening the stream — no bytes yet) or a
  // live progress bar + speed/ETA once bytes flow. (Genuinely-queued books with
  // no worker aren't here — they read "Queued" in the main list.)
  html += '<div class="ap-sec">' + esc(t("ap.downloading_sec")) + ' (' + active +
    (connecting ? ' · ' + connecting + ' ' + t("ap.connecting_sum") : '') +
    (paused ? ' · ' + paused + ' ' + t("ap.paused_sum") : '') + ')</div>';
  if (!legList.length) html += '<div class="ap-empty">' + esc(t("ap.no_downloads")) + '</div>';

    if (v.state === "paused") {

    } else if (legTransferring(v, leg)) {

      stats = fmtSpeed(leg.speed) + " · " + fmtEta(leg.eta);
    } else {
      // Not transferring yet: resolving the mirror, following the 307, rotating edges.
      // A partial already on disk (a resume) shows its %, never a 0% restart bar.
      pct = leg.progress || 0;
      if (pct > 0) {
        stats = t("ap.resuming") + " " + pct + "% · " + t("ap.connecting") + " " + (leg.host || "mirror");
      } else {
        stats = t("ap.connecting") + " " + (leg.host || "mirror");

    var badge = leg.hedge ? '<span class="hedge-badge" title="hedge: speculative copy racing on another host">H</span> ' : '';

      '<span class="ap-bar' + barCls + '"><i style="width:' + pct + '%"></i></span>' +
      '<span class="ap-stats">' + esc(stats) + '</span></div>';

  document.getElementById("apBody").innerHTML = html;
}

/* Open the chronicle for a book in the history modal (oldest first). The modal

var HIST_BOOK = null, HIST_TIMER = null, HIST_SIG = "";
function findBookInVm(vm, uid) {
  // uid is the UI's globally-unique "<listId>/<backendId>"; the backend vm uses
  // the per-list backend id (bk.id) keyed under its list, so match on both.
  var slash = String(uid).indexOf("/");
  var listId = slash >= 0 ? uid.slice(0, slash) : null;
  var bid = slash >= 0 ? uid.slice(slash + 1) : uid;
  var ls = (vm && vm.lists) || [];
  for (var i = 0; i < ls.length; i++) {
    if (listId && ls[i].id !== listId) continue;
    for (var g = 0; g < (ls[i].groups || []).length; g++)
      for (var b = 0; b < (ls[i].groups[g].books || []).length; b++)
        if (ls[i].groups[g].books[b].id === bid) return ls[i].groups[g].books[b];
  }

}
function fillHistoryFrom(bk) {
  if (!bk) return;

  if (sel && String(sel).length > 0 && sel.anchorNode && sheet.contains(sel.anchorNode)) return;
  var sig = (bk.history || []).length + ":" + ((bk.history || [])[(bk.history || []).length - 1] || {}).at_ms;
  if (sig === HIST_SIG) return; // nothing new → don't rebuild (keeps selection)

    .catch(function () {});
