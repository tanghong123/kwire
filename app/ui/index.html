  if (t.dataset.fmtmv) { // reorder preferred formats
    var fp = t.dataset.fmtmv.split(":"), idx = +fp[0], j = fp[1] === "up" ? idx - 1 : idx + 1;
    if (j >= 0 && j < FORMATS.length) { var tmp = FORMATS[idx]; FORMATS[idx] = FORMATS[j]; FORMATS[j] = tmp; }
    renderFormatRank();
    return;
  }
  if (t.dataset.fmtrm) { // remove a preferred format (keep at least one)
    var ri = FORMATS.indexOf(t.dataset.fmtrm);
    if (ri >= 0 && FORMATS.length > 1) FORMATS.splice(ri, 1);
    renderFormatRank(); return;
  }
  if (t.dataset.fmtadd) { // add a format to the preferred list
    if (FORMATS.indexOf(t.dataset.fmtadd) < 0) FORMATS.push(t.dataset.fmtadd);
    renderFormatRank(); return;
  }
  if (t.dataset.fmtshowall) { SHOW_ALL_FORMATS = !SHOW_ALL_FORMATS; renderFormatRank(); return; }
  if (t.dataset.toggleSet === "seq") { SETTINGS.seq_per_group = !SETTINGS.seq_per_group; renderSettings(); return; }
  if (t.dataset.setlang) { setUiLang(t.dataset.setlang); renderSettings(); return; } // switch app language (live)

  if (t.dataset.replace) { // download the recommended copy, Trash the old on success
    var rp = t.dataset.replace.split(":"), rbk = bookById(rp[0]);
    if (rbk) onReplaceDownload(rbk.bid, rp[1], rbk.list);
    return;
  }
  if (t.dataset.history) { openHistory(t.dataset.history); return; }
  if (t.dataset.manual) { // open the manual-md5 input for a not-found book
    MANUAL_FOR = t.dataset.manual; render();
    var mi = document.getElementById("manualMd5"); if (mi) mi.focus();
    return;
  }
  if (t.dataset.manualcancel) { MANUAL_FOR = null; render(); return; }
  if (t.dataset.manualgo) { // submit the pasted md5/URL for download
    var inp = document.getElementById("manualMd5"), errEl = document.getElementById("manualErr");
    var val = inp ? inp.value.trim() : "";
    if (!val) { if (errEl) errEl.textContent = t("misc.manual_empty"); return; }
    onAddManual(t.dataset.manualgo, val, errEl);
    return;
  }
  if (t.dataset.requery) { // "Search again": re-query JUST this book (not the whole list)
    var rqbk = bookById(t.dataset.requery);
    if (rqbk) onSearchAgain(rqbk);
    return;
  }
  if (t.dataset.editbook) { EDIT_BOOK = t.dataset.editbook; render(); return; }
  if (t.dataset.editcancel) { EDIT_BOOK = null; render(); return; }
  if (t.dataset.editsave) {
    var ebk = bookById(t.dataset.editsave);
    var ti = document.getElementById("editTitle"), au = document.getElementById("editAuthor");
    onEditBook(ebk, ti ? ti.value : "", au ? au.value : "");
    return;
  }
  if (t.dataset.removebook) { var rmb = bookById(t.dataset.removebook); if (rmb) removeBook(rmb); return; }
  if (t.dataset.accept) { // accept the already-downloaded copy (clear review)
    var abk = bookById(t.dataset.accept);
    onAcceptDownload(abk && abk.bid, abk && abk.list);
    return;
  }
  if (t.dataset.remove) { // move a downloaded variation's file to Trash + remove it
    // The md5 is hex (no ":"), so split on the FIRST ":" only — the book id is
    // everything before it. Do NOT gate on window.confirm(): in the Tauri webview
    // a synchronous confirm() can return false without showing a dialog, which
    // silently swallowed the click. Removal moves the file to Trash (recoverable).
    var sep = t.dataset.remove.indexOf(":");
    var rid = t.dataset.remove.slice(0, sep), rmd5 = t.dataset.remove.slice(sep + 1);
    var rmbk = bookById(rid);
    if (rmbk && hasTauri()) {
      invoke("remove_download", { listId: listArg(rmbk.list), bookId: rmbk.bid, md5: rmd5 })
        .then(applyLibrary)
        .catch(function (err) { toast("Remove failed: " + (errText(err) || "unknown error")); });
    }
    return;
  }
  if (t.dataset.marknf) { // user gives up on a "Needs you" book → Cannot download
    var nbk = bookById(t.dataset.marknf);
    if (nbk) { nbk.discovery = "not_found"; nbk.review = false; render(); } // optimistic
    if (hasTauri() && nbk) {
      invoke("mark_not_found", { listId: listArg(nbk.list), bookId: nbk.bid })
        .then(applyLibrary)
        .catch(function (err) { console.error("mark_not_found failed:", err && err.message); });
    }
    return;
  }
  if (t.dataset.dl) { // download (or re-download/retry) a specific variation
    var p = t.dataset.dl.split(":"), bk = bookById(p[0]), v = bk && bk.versions[+p[1]];
    if (v) { v.state = "downloading"; v.progress = 3; }       // optimistic
    render();
    if (hasTauri() && v) onRequestVariation(bk.bid, v.md5, bk.list);
    return;
  }
  if (t.dataset.cancelv) { // un-request a not-yet-started variation -> available
    var p2 = t.dataset.cancelv.split(":"), bk2 = bookById(p2[0]), v2 = bk2 && bk2.versions[+p2[1]];
    if (v2) { v2.state = "available"; v2.progress = 0; }       // optimistic
    render();
    if (hasTauri() && v2) onCancelVariation(bk2.bid, v2.md5, bk2.list);
    return;
  }
  if (t.dataset.canceldl) { // cancel an in-flight/queued/paused variation download
    var pc = t.dataset.canceldl.split(":"), bkc = bookById(pc[0]), vc = bkc && bkc.versions[+pc[1]];
    if (vc) { vc.state = "cancelled"; vc.progress = 0; }       // optimistic
    render();
    if (hasTauri() && vc) onCancelDownload(bkc.bid, vc.md5, bkc.list);
    return;
  }
  if (t.dataset.pausev) { // pause an in-flight/queued variation download
    var pp = t.dataset.pausev.split(":"), bkp = bookById(pp[0]), vp = bkp && bkp.versions[+pp[1]];
    if (vp) { vp.state = "paused"; }                            // optimistic
    render();
    if (hasTauri() && vp) onPauseVariation(bkp.bid, vp.md5, bkp.list);
    return;
  }
  if (t.dataset.resumev) { // resume a paused variation download
    var pr = t.dataset.resumev.split(":"), bkr = bookById(pr[0]), vr = bkr && bkr.versions[+pr[1]];
    if (vr) { vr.state = "downloading"; }                       // optimistic
    render();
    if (hasTauri() && vr) onResumeVariation(bkr.bid, vr.md5, bkr.list);
    return;
  }
  if (t.dataset.series) { // download the whole series this book belongs to
    var sbk = bookById(t.dataset.series);
    if (sbk) onDownloadSeries(sbk.bid, sbk.list);
    return;
  }
  if (t.dataset.reveal != null) { if (t.dataset.reveal) onReveal(t.dataset.reveal); return; }
  if (t.dataset.top) { var bt = bookById(t.dataset.top); if (bt) bt.priority = !bt.priority; render(); return; }
  if (t.dataset.list) {
    CURRENT = t.dataset.list; FILTER = "all"; FMT_FILTER = ""; SELECTED = null; render();
    if (hasTauri()) invoke("select_list", { listId: CURRENT }).catch(function () {});
    return;
  }
  if (t.dataset.filter) { FILTER = t.dataset.filter; SELECTED = null; render(); return; }
  if (t.dataset.fmtfilter != null) { // toggle the format filter (click active = clear)
    FMT_FILTER = (FMT_FILTER === t.dataset.fmtfilter ? "" : t.dataset.fmtfilter); SELECTED = null; render(); return;
  }
  if (t.dataset.toggle != null) {
    var key = t.dataset.toggle;
    if (key.charAt(0) === "L") { var l = LISTS[+key.slice(1)]; l.collapsedAll = !l.collapsedAll; }
    else { var g = currentList().groups[+key.slice(1)]; g.collapsed = !g.collapsed; }
    render(); return;
  }
  if (t.dataset.open) { // select a book → open its inline detail panel
    if (SELECTED === t.dataset.open) { DETAIL_COLLAPSED = !DETAIL_COLLAPSED; }
    else { SELECTED = t.dataset.open; DETAIL_COLLAPSED = false; }
    render(); return;
  }
  if (t.dataset.imptab) { IMPORT_TAB = t.dataset.imptab; syncImportTabs(); return; }

  var a = t.dataset.action;
  if (a === "toggle-run") { onToggleRun(); return; }
  if (a === "open-import") { openImport(); return; }
  if (a === "close-import") { closeImport(); return; }
  if (a === "confirm-import") { onConfirmImport(); return; }
  if (a === "open-settings") { openSettings(); return; }
  if (a === "close-settings") { closeSettings(); return; }
  if (a === "close-history") { closeHistory(); return; }
  if (a === "save-settings") { onSaveSettings(); return; }
  if (a === "choose-folder") { onChooseFolder(); return; }
  if (a === "refresh-mirrors") { onRefreshMirrors(); return; }
  if (a === "reorganize-files") { onReorganizeFiles(t); return; }
  if (a === "reorganize-details") { onReorganizeDetails(); return; }
  if (a === "cleanup-parts") { onCleanupParts(t); return; }
  if (a === "close-drawer") { DETAIL_COLLAPSED = true; render(); return; }
  if (a === "toggle-active") { ACTIVE_COLLAPSED = !ACTIVE_COLLAPSED; renderActivePanel(); return; }
  if (a === "toggle-sidebar") {
    SIDEBAR_COLLAPSED = !SIDEBAR_COLLAPSED;
    document.getElementById("sidebar").classList.toggle("collapsed", SIDEBAR_COLLAPSED);
    return;
  }
  if (a === "noop") { return; }
});

/* ---- settings sheet ---- */
function openSettings() {
  renderSettings();
  document.getElementById("settingsScrim").classList.add("open");
  document.getElementById("settingsSheet").classList.add("open");
  // Gray "Reorganize now" if the on-disk layout is already canonical.
  if (hasTauri()) {
    invoke("reorganize_needed")
      .then(function (n) { REORG_COUNT = n | 0; renderSettings(); })
      .catch(function () {});
  }
}
function closeSettings() {
  document.getElementById("settingsScrim").classList.remove("open");
  document.getElementById("settingsSheet").classList.remove("open");
}
/* Read the inputs back into state. (Returns the collected values so the Tauri
   save can forward them to set_settings + set_config.) */
function collectSettings() {
  function num(id, def) { var v = parseFloat((document.getElementById(id) || {}).value); return isNaN(v) ? def : v; }
  function str(id, def) { var el = document.getElementById(id); return el ? el.value : def; }
  SETTINGS.auto_threshold = num("setAuto", SETTINGS.auto_threshold);
  SETTINGS.near_threshold = num("setNear", SETTINGS.near_threshold);
  SETTINGS.naming_template = str("setTpl", SETTINGS.naming_template);
  SETTINGS.keep_top = Math.max(1, Math.round(num("setKeep", SETTINGS.keep_top)));
  SETTINGS.language = str("setLang", SETTINGS.language).trim();
  APPCFG.out_dir = str("setOut", APPCFG.out_dir);
  APPCFG.max_concurrent_downloads = Math.max(1, Math.round(num("setMaxDl", APPCFG.max_concurrent_downloads || 5)));
  APPCFG.query_concurrency = Math.max(1, Math.round(num("setQConc", APPCFG.query_concurrency)));
  APPCFG.max_attempts = Math.max(1, Math.round(num("setAttempts", APPCFG.max_attempts)));
  var hedgeEl = document.getElementById("setHedge");
  if (hedgeEl) APPCFG.hedge_enabled = !!hedgeEl.checked;
}
/* Save: collect the inputs, then (under Tauri) persist per-list settings via
   set_settings and global settings via set_config; over file:// just round-trip
   the JS state. */
function onSaveSettings() {
  collectSettings();
  closeSettings();
  render();
  if (!hasTauri()) return;
  // Persist to the engine. The client state (just collected) stays the source of
  // truth for the open UI, so we do NOT re-apply the backend response (which
  // could otherwise momentarily revert the sheet); a relaunch loads the
  // persisted values fresh. "match-title" (the default) is sent as an empty
  // language; the engine infers each book's language from its title's script and
  // applies it as a soft preference (see matching::detect_title_language).
  invoke("set_settings", {
    listId: listArg(CURRENT),
    settings: {
      format_pref: FORMATS,
      language: SETTINGS.language === "match-title" ? "" : SETTINGS.language,
      naming_template: SETTINGS.naming_template,
      auto_threshold: SETTINGS.auto_threshold,
      near_threshold: SETTINGS.near_threshold,
      seq_per_group: SETTINGS.seq_per_group,
      keep_top: SETTINGS.keep_top
    }
  })
    .then(function () {
      return invoke("set_config", {
        config: {
          out_dir: APPCFG.out_dir,
          max_concurrent_downloads: APPCFG.max_concurrent_downloads,
          query_concurrency: APPCFG.query_concurrency,
          max_attempts: APPCFG.max_attempts,
          hedge_enabled: APPCFG.hedge_enabled
        }
      });
    })
    .catch(function (err) {
      console.error("save settings failed:", err && err.message);
      alert("Couldn't save settings: " + ((err && err.message) || err));
    });
}
/* Choose a download folder. Uses the dialog plugin when available; otherwise the
   text field remains the source of truth (an acceptable fallback). */
function onChooseFolder() {
  if (TAURI && TAURI.dialog && TAURI.dialog.open) {
    TAURI.dialog.open({ directory: true, multiple: false })
      .then(function (dir) {
        if (dir) { APPCFG.out_dir = dir; var el = document.getElementById("setOut"); if (el) el.value = dir; }
      })
      .catch(function () {});
  }
}

/* =====================================================================
   Backend actions. Each calls a real Tauri command when the engine is present
   and re-applies the returned ViewModel; over file:// the optimistic local
   mutation above already reflected the change (the demo simulation drives the
   rest).
   ===================================================================== */
/* `listId` is the engine-side list a book belongs to; "__all__" is never a real
   list, so resolve it to null and let the backend fall back to the active list. */
function listArg(listId) { return listId && listId !== "__all__" ? listId : null; }

function onRequestVariation(bookId, md5, listId) {
  invoke("request_variation", { listId: listArg(listId), bookId: bookId, md5: md5 })
    .then(applyLibrary)
    .catch(function (err) {
      // Surface the cross-list guard ("this file is already chosen for …") and any
      // other selection failure — silently swallowing it left the user wondering
      // why a click did nothing.
      toast(decodeI18n(errText(err)) || "Couldn't select that copy.");
      console.error("request_variation failed:", err && err.message);
    });
}
/* "Enter manually": send a user-pasted md5 (or libgen URL) for a not-found book.
   `bookId` is the composite UI id; the backend needs the per-list bid + list. */
function onAddManual(bookId, input, errEl) {
  if (!hasTauri()) { if (errEl) errEl.textContent = t("misc.app_only"); return; }
  var bk = bookById(bookId);
  if (!bk) return;
  invoke("add_manual_download", { listId: listArg(bk.list), bookId: bk.bid, input: input })
    .then(function (lib) { MANUAL_FOR = null; applyLibrary(lib); })
    .catch(function (err) { if (errEl) errEl.textContent = t("misc.failed_prefix") + (errText(err) || t("misc.failed_unknown")); });
}
/* Replace a wrong download with the recommended copy: queues the recommended
   variation; the old file is moved to Trash once the new one finishes. */
function onReplaceDownload(bookId, md5, listId) {
  if (!hasTauri()) return;
  invoke("replace_download", { listId: listArg(listId), bookId: bookId, recommendedMd5: md5 })
    .then(applyLibrary)
    .then(function () { return invoke("start_downloads", { listId: listArg(listId) }); })
    .then(applyLibrary)
    .catch(function (err) { console.error("replace_download failed:", err && err.message); });
}
/* Accept the already-downloaded copy of a book under review (clear "check
   download"); the book settles as Done without re-downloading. */
function onAcceptDownload(bookId, listId) {
  if (!hasTauri()) {
    var b = bookById(bookId); // offline/preview: optimistic
    if (b) { b.review = false; render(); }
    return;
  }
  invoke("accept_download", { listId: listArg(listId), bookId: bookId })
    .then(applyLibrary)
    .catch(function (err) { console.error("accept_download failed:", err && err.message); });
}
function onCancelVariation(bookId, md5, listId) {
  invoke("cancel_variation", { listId: listArg(listId), bookId: bookId, md5: md5 })
    .then(applyLibrary)
    .catch(function (err) { console.error("cancel_variation failed:", err && err.message); });
}
/* Lifecycle: pause/resume/cancel an in-flight (or queued/paused) variation. */
function onPauseVariation(bookId, md5, listId) {
  invoke("pause_variation", { listId: listArg(listId), bookId: bookId, md5: md5 })
    .then(applyLibrary)
    .catch(function (err) { console.error("pause_variation failed:", err && err.message); });
}
function onResumeVariation(bookId, md5, listId) {
  invoke("resume_variation", { listId: listArg(listId), bookId: bookId, md5: md5 })
    .then(applyLibrary)
    // Resuming returns the job to Pending; kick the queue so it actually continues.
    .then(function (lib) { return invoke("start_downloads", { listId: listArg(listId), site: "libgen.li" }); })
    .then(applyLibrary)
    .catch(function (err) { console.error("resume_variation failed:", err && err.message); });
}
/* "Download whole series →": look the book's series up on Open Library, seed a
   NEW list with its ordered members, and run it. On success the backend returns
   the refreshed library with the new list already selected — adopt that
   selection. Over file:// (no engine) this no-ops gracefully. */
/* In-app toast. The Tauri webview does not reliably show window.alert()/confirm(),
   so user feedback (errors, async results) must render in the DOM. Self-contained:
   no markup/CSS needed up front. */
function toast(msg, opts) {
  opts = opts || {};
  var d = document.createElement("div");
  d.textContent = msg;
  d.style.cssText = "position:fixed;bottom:26px;left:50%;transform:translateX(-50%);" +
    "background:var(--text);color:var(--panel);padding:10px 16px;border-radius:8px;" +
    "font-size:13px;z-index:9999;box-shadow:0 6px 20px rgba(0,0,0,.28);max-width:80%;text-align:center;";
  document.body.appendChild(d);
  // Sticky toasts stay until the caller removes the returned node (e.g. a long
  // async op); otherwise they auto-dismiss.
  if (!opts.sticky) setTimeout(function () { d.remove(); }, opts.ms || 4000);
  return d;
}
function errText(err) { return (typeof err === "string" ? err : (err && err.message)) || ""; }

/* Reliable in-DOM confirm (the webview's confirm() is unreliable — it can return
   false WITHOUT showing a dialog). Renders a sticky toast with Cancel/Confirm and
   runs onYes() only when confirmed. */
function confirmToast(msg, confirmLabel, onYes) {
  var d = document.createElement("div");
  d.style.cssText = "position:fixed;bottom:26px;left:50%;transform:translateX(-50%);" +
    "background:var(--text);color:var(--panel);padding:12px 16px;border-radius:8px;" +
    "font-size:13px;z-index:9999;box-shadow:0 6px 20px rgba(0,0,0,.28);max-width:80%;" +
    "display:flex;flex-direction:column;gap:10px;align-items:center;text-align:center;";
  var m = document.createElement("div"); m.textContent = msg; d.appendChild(m);
  var row = document.createElement("div"); row.style.cssText = "display:flex;gap:8px;";
  var no = document.createElement("button"); no.textContent = "Cancel";
  var yes = document.createElement("button"); yes.textContent = confirmLabel || "Confirm";
  var bs = "padding:5px 14px;border-radius:6px;border:0;cursor:pointer;font-size:13px;";
  no.style.cssText = bs + "background:var(--border-strong);color:var(--text);";
  yes.style.cssText = bs + "background:var(--red);color:#fff;";
  row.appendChild(no); row.appendChild(yes); d.appendChild(row);
  document.body.appendChild(d);
  no.onclick = function () { d.remove(); };
  yes.onclick = function () { d.remove(); onYes(); };
}

function onDownloadSeries(bookId, listId) {
  if (!hasTauri()) return;
  // Sticky loading toast — the Open Library lookup can take several seconds, so
  // keep the indicator up until it resolves (removed in both then/catch).
  var loading = toast(t("misc.series_loading"), { sticky: true });
  invoke("download_series", { listId: listArg(listId), bookId: bookId })
    .then(function (lib) {
      loading.remove();
      if (lib && lib.current) { CURRENT = lib.current; SELECTED = null; }
      toast(t("misc.series_created"));
      return applyLibrary(lib);
    })
    .catch(function (err) {
      loading.remove();
      toast(decodeI18n(errText(err)) || t("misc.series_failed"));
    });
}
function onCancelDownload(bookId, md5, listId) {
  invoke("cancel_download", { listId: listArg(listId), bookId: bookId, md5: md5 })
    .then(applyLibrary)
    .catch(function (err) { console.error("cancel_download failed:", err && err.message); });
}
function onSetFormatPref() {
  invoke("set_format_pref", { listId: listArg(CURRENT), formats: FORMATS })
    .then(applyLibrary)
    .catch(function (err) { console.error("set_format_pref failed:", err && err.message); });
}
function onReveal(path) {
  if (hasTauri() && path) invoke("reveal", { path: path }).catch(function (err) { console.error("reveal failed:", err && err.message); });
}
/* Global button: "Start downloading for all lists" (start_all) ⇄ "Stop all"
   (stop_all). The engine drives discovery+download in the background. */
function onToggleRun() {
  RUNNING = !RUNNING;
  document.getElementById("runBtn").textContent = RUNNING ? t("toolbar.stop_all") : t("toolbar.start_all");
  if (hasTauri()) {
    var cmd = RUNNING ? "start_all" : "stop_all";
    invoke(cmd, {}).then(applyLibrary)
      .catch(function (err) { console.error(cmd + " failed:", err && err.message); })
      .finally(renderActivePanel);
    return;
  }
  if (RUNNING) startSim(); else stopSim();
  renderActivePanel();
}

/* Per-list download control (from the list right-click menu) — engine goals. */
function startListDownloads(listId) {
  if (!listId || listId === "__all__") return;
  if (!hasTauri()) { setQuerying(true, "Starting…"); setTimeout(function () { setQuerying(false); }, 500); return; }
  invoke("start", { listId: listId }).then(applyLibrary)
    .catch(function (err) { console.error("start failed:", err && err.message); })
    .finally(renderActivePanel);
}
function pauseListDownloads(listId) {
  if (!listId || listId === "__all__") return;
  if (!hasTauri()) return;
  invoke("stop", { listId: listId }).then(applyLibrary)
    .catch(function (err) { console.error("stop failed:", err && err.message); })
    .finally(renderActivePanel);
}
function removeList(listId) {
  if (!listId || listId === "__all__" || !hasTauri()) return;
  var l = (LISTS || []).filter(function (x) { return x.id === listId; })[0];
  var name = (l && l.title) || "this list";
  confirmToast('Remove "' + name + '"? The list and its tracking are deleted; downloaded files on disk are kept.', "Remove list", function () {
    invoke("delete_list", { listId: listId }).then(applyLibrary)
      .catch(function (err) { toast("Remove failed: " + (errText(err) || "unknown error")); });
  });
}
/* A book belongs to the mutable Manual list (per-book add/remove allowed). */
function isManualBook(bk) {
  var l = (LISTS || []).filter(function (x) { return x.id === bk.list; })[0];
  return !!(l && l.is_manual);
}
function removeBook(bk) {
  if (!bk || !hasTauri()) return;
  confirmToast('Remove "' + (bk.title || "this book") + '" from the Manual list? Its downloaded file (if any) stays on disk.', "Remove book", function () {
    invoke("remove_book", { listId: listArg(bk.list), bookId: bk.bid }).then(applyLibrary)
      .catch(function (err) { toast("Remove failed: " + (errText(err) || "unknown error")); });
  });
}
function onConfirmImport() {
  if (!hasTauri()) { closeImport(); return; }
  // Manual tab → APPEND one book to the mutable Manual list (find-or-create). This
  // is a per-book add, NOT a list import — so it isn't subject to the duplicate-title
  // reject and the Manual list keeps accumulating books.
  if (IMPORT_TAB === "manual") {
    var title = (document.getElementById("mTitle").value || "").trim();
    var author = (document.getElementById("mAuthor").value || "").trim();
    if (!title) { toast("Title can't be empty."); return; }
    invoke("add_manual_book", { title: title, author: author || null })
      .then(function (vl) { applyLibrary(vl); closeImport(); })
      .catch(function (err) { toast(decodeI18n(errText(err)) || "Couldn't add the book."); });
    return;
  }
  // File tab → import a whole list. load_list is an implicit Start; a duplicate-titled
  // list is REJECTED — keep the sheet open and surface the reason.
  var payload = importPayload();
  if (!payload) { closeImport(); return; }
  invoke("load_list", { text: payload.text, isJson: payload.isJson })
    .then(function (vl) { applyLibrary(vl); closeImport(); })
    .catch(function (err) { toast(errText(err) || "Import failed."); });
}
/* The file tab's payload (the manual tab is handled directly in onConfirmImport). */
function importPayload() {
  return IMPORT_FILE ? { text: IMPORT_FILE.text, isJson: IMPORT_FILE.isJson } : null;
}

/* ---- import sheet ---- */
function openImport() {
  IMPORT_FILE = null;
  document.getElementById("fileInput").value = "";
  document.getElementById("fileChosen").classList.add("hide");
  IMPORT_TAB = "file"; syncImportTabs();
  document.getElementById("scrim").classList.add("open");
  document.getElementById("sheet").classList.add("open");
}
/* Read a chosen/dropped .md or .json file into the import flow. Format detected
   from the extension, falling back to a content sniff ('{' = JSON). */
function readImportFile(file) {
  if (!file) return;
  var r = new FileReader();
  r.onload = function () {
    var text = String(r.result || "");
    var isJson = /\.json$/i.test(file.name) || text.trim().charAt(0) === "{";
    IMPORT_FILE = { text: text, isJson: isJson, name: file.name };
    var fc = document.getElementById("fileChosen");
    fc.classList.remove("hide");
    fc.innerHTML = "📄 " + esc(file.name) + " · " + (isJson ? "JSON" : "Markdown") +
      " · " + Math.max(1, Math.round(text.length / 1024)) + " KB";
    updateImportPreview();
  };
  r.readAsText(file);
}
function closeImport() {
  document.getElementById("scrim").classList.remove("open");
  document.getElementById("sheet").classList.remove("open");
}
function syncImportTabs() {
  var tabs = document.querySelectorAll("#importTabs .tab");
  tabs.forEach(function (b) { b.classList.toggle("active", b.dataset.imptab === IMPORT_TAB); });
  document.querySelectorAll("[data-imppane]").forEach(function (p) { p.classList.toggle("hide", p.dataset.imppane !== IMPORT_TAB); });
  updateImportPreview();
}
document.addEventListener("input", function (e) {
  if (/^m(Title|Author|Fmt)$/.test(e.target.id)) updateImportPreview();
  // Live-update the slider value readouts in the Settings sheet.
  if (e.target.id === "setAuto") { var v = document.getElementById("setAutoVal"); if (v) v.textContent = (+e.target.value).toFixed(2); }
  if (e.target.id === "setNear") { var v2 = document.getElementById("setNearVal"); if (v2) v2.textContent = (+e.target.value).toFixed(2); }
});
document.addEventListener("change", function (e) {
  if (e.target.id === "fileInput") readImportFile(e.target.files && e.target.files[0]);
});
function updateImportPreview() {
  var pv = document.getElementById("importPreview");
  var groups = [];
  try {
    if (IMPORT_TAB === "file") {
      if (!IMPORT_FILE) { pv.innerHTML = '<span style="color:var(--text-faint)">' + esc(t("import.preview_choose")) + '</span>'; return; }
      groups = IMPORT_FILE.isJson ? parseJsonPreview(IMPORT_FILE.text) : parseMdPreview(IMPORT_FILE.text);
    } else {
      groups = [{ name: t("import.manual_default_group"), books: [ (document.getElementById("mTitle").value || "—") + " — " + (document.getElementById("mAuthor").value || "—") ] }];
    }
  } catch (err) { pv.innerHTML = '<span style="color:var(--red)">' + esc(t("import.preview_parse_err")) + esc(err.message) + '</span>'; return; }
  var n = groups.reduce(function (a, g) { return a + g.books.length; }, 0);
  var html = '<div style="color:var(--text-dim);margin-bottom:6px">' + esc(t("import.preview_summary")) + ' · ' + groups.length + ' ' + esc(t("import.preview_groups")) + ' ' + n + ' ' + esc(t("import.preview_books")) + '</div>';
  groups.forEach(function (g) {
    html += '<div class="pg">' + esc(g.name) + '</div>';
    g.books.forEach(function (b) { html += '<div class="pb">' + esc(b) + '</div>'; });
  });
  pv.innerHTML = html;
}
function parseMdPreview(md) {
  var groups = [], cur = null;
  md.split("\n").forEach(function (line) {
    var l = line.trim();
    var h = l.match(/^#{2,3}\s+(.*)/);
    var t = l.match(/^#\s+(.*)/);
    var it = l.match(/^(?:\d+[.)]|[-*])\s+(.*)/);
    if (h) { cur = { name: h[1].replace(/^.*—\s*/, ""), books: [] }; groups.push(cur); }
    else if (t) { /* list title */ }
    else if (it) { if (!cur) { cur = { name: "Books", books: [] }; groups.push(cur); } cur.books.push(it[1]); }
  });
  return groups;
}
function parseJsonPreview(txt) {
  var o = JSON.parse(txt);
  return (o.sections || []).map(function (s) {
    return { name: s.title || "Group", books: (s.books || []).map(function (b) { return b.title + (b.author ? " — " + b.author : ""); }) };
  });
}

/* ---- simulation: animate the queue so flows are demoable ---- */
var simTimer = null;
function startSim() {
  if (simTimer) return;
  simTimer = setInterval(function () {
    // The engine is global: advance/promote across ALL lists, capped by a global
    // active limit (mirrors the shared per-host concurrency). Advance each
    // downloading VARIATION independently.
    var downloading = [];
    everyBook().forEach(function (b) {
      (b.versions || []).forEach(function (v) { if (v.state === "downloading") downloading.push(v); });
    });
    downloading.forEach(function (v) {
      v.progress += 6 + ((v.size * 10) % 5);
      if (v.progress >= 100) { v.progress = 100; v.state = "done"; }
    });
    // Prioritized ("move to top") books jump the queue; otherwise FIFO. Start
    // the best available variation of the next queued book.
    if (downloading.length < 5) {
      var queued = everyBook().filter(function (b) { return effectiveStatus(b) === "queued" && (b.versions || []).length; });
      var q = queued.filter(function (b) { return b.priority; })[0] || queued[0];
      if (q) { q.versions[0].state = "downloading"; q.versions[0].progress = 4; q.priority = false; }
    }
    render();
  }, 700);
}
function stopSim() { if (simTimer) { clearInterval(simTimer); simTimer = null; } }

/* =====================================================================
   Backend integration — when running under Tauri, replace the multi-list demo
   with the single real list the engine has loaded, and keep it congruent with
   the demo shape so all the same render/interaction code applies.
   ===================================================================== */

/* Adapt a backend ViewModel into one entry of LISTS (the UI's list shape). The
   engine already projects per-variation state, so this is a near-identity map. */
function vmToList(vm) {
  return {
    id: vm.id || "loaded",
    title: vm.title,
    subtitle: vm.subtitle,
    is_manual: !!vm.is_manual,
    collapsedAll: false,
    groups: (vm.groups || []).map(function (g) {
      return {
        name: g.name,
        collapsed: !!g.collapsed,
        books: (g.books || []).map(function (bk) {
          return {
            // `id` is GLOBALLY unique (list + backend id) — book ids reset to bk0
            // per list, so a bare bk.id collides across lists (wrong detail panel).
            // `bid` keeps the per-list backend id for engine calls (paired w/ list).
            id: (vm.id || "loaded") + "/" + bk.id, bid: bk.id,
            list: vm.id || "loaded", title: bk.title, author: bk.author,
            seq: bk.seq, priority: false, discovery: bk.discovery,
            year: (bk.year != null ? bk.year : null), pages: (bk.pages != null ? bk.pages : null),
            backfilled: bk.backfilled || [],
            review: !!bk.review, recommended_md5: bk.recommended_md5 || null,
            history: bk.history || [],
            versions: (bk.versions || []).map(function (v) {
              return {
                fmt: v.fmt, size: v.size, year: v.year, publisher: v.publisher || "",
                title: v.title || "", author: v.author || "",
                language: v.language || "", pages: (v.pages != null ? v.pages : null),
                counted_pages: (v.counted_pages != null ? v.counted_pages : null),
                low_pages: !!v.low_pages,
                md5: v.md5, state: v.state, progress: v.progress || 0, host: v.host || null,
                output_path: v.output_path || null,
                cover_url: v.cover_url || null, score: (v.score != null ? v.score : null),
                downloaded_bytes: (v.downloaded_bytes != null ? v.downloaded_bytes : null),
                total_bytes: (v.total_bytes != null ? v.total_bytes : null),
                speed_bps: (v.speed_bps != null ? v.speed_bps : null),
                eta_secs: (v.eta_secs != null ? v.eta_secs : null)
              };
            })
          };
        })
      };
    })
  };
}

/* Apply a backend ViewLibrary `{ lists, current }`: rebuild the multi-list
   sidebar from the engine's persisted lists, preserving each list's
   group-collapse state and the current selection/filter. The preferred-format
   order is taken FROM the active list (authoritative). */
function applyLibrary(libVm) {
  if (!libVm || !libVm.lists) return libVm;
  // Remember collapse state per list+group across rebuilds.
  var collapsed = {}, liveProg = {};
  LISTS.forEach(function (l) {
    l.groups.forEach(function (g) {
      collapsed[l.id + "::" + g.name] = !!g.collapsed;
      // Snapshot LIVE in-flight telemetry: the backend viewmodel's downloaded_bytes
      // comes from the persisted job (which lags the live download), so a rebuild here
      // would reset a downloading variation toward 0 — that's the downloading↔connecting
      // flicker. Keep the live numbers and re-apply them below if they're still ahead.
      g.books.forEach(function (b) {
        (b.versions || []).forEach(function (v) {
          if (v.state === "downloading" && ((v.downloaded_bytes || 0) > 0 || (v.speed_bps || 0) > 0))
            liveProg[v.md5] = { db: v.downloaded_bytes, sp: v.speed_bps, eta: v.eta_secs, tot: v.total_bytes, pr: v.progress };
        });
      });
    });
  });

  LISTS = libVm.lists.map(function (vm) {
    var list = vmToList(vm);
    list.groups.forEach(function (g) { g.collapsed = !!collapsed[list.id + "::" + g.name]; });
    return list;
  });
  // Re-apply live progress where it's still ahead of the (lagged) rebuild, so the bar
  // and the active-panel "downloading"/"connecting" label don't jump backward.
  LISTS.forEach(function (l) { l.groups.forEach(function (g) { g.books.forEach(function (b) {
    (b.versions || []).forEach(function (v) {
      var lp = liveProg[v.md5];
      if (lp && v.state === "downloading" && (lp.db || 0) > (v.downloaded_bytes || 0)) {
        v.downloaded_bytes = lp.db; v.speed_bps = lp.sp; v.eta_secs = lp.eta;
        if (lp.tot) v.total_bytes = lp.tot;
        if (lp.pr != null) v.progress = lp.pr;
      }
    });
  }); }); });

  // Keep the current selection if still valid; else follow the backend / first.
  var ids = LISTS.map(function (l) { return l.id; });
  if (CURRENT !== "__all__" && ids.indexOf(CURRENT) < 0) {
    CURRENT = (libVm.current && (libVm.current === "__all__" || ids.indexOf(libVm.current) >= 0))
      ? libVm.current : (ids[0] || "__all__");
  }
  // Preferred-format order + per-list settings from the active (or first) list.
  var active = LISTS.filter(function (l) { return l.id === CURRENT; })[0] || LISTS[0];
  var vmActive = libVm.lists.filter(function (v) { return (v.id || "loaded") === (active && active.id); })[0];
  if (vmActive && vmActive.format_pref && vmActive.format_pref.length) FORMATS = vmActive.format_pref.slice();
  if (vmActive && vmActive.settings) {
    var s = vmActive.settings;
    SETTINGS = {
      language: s.language || "",
      naming_template: s.naming_template,
      auto_threshold: s.auto_threshold,
      near_threshold: s.near_threshold,
      seq_per_group: !!s.seq_per_group,
      keep_top: s.keep_top
    };
    if (s.format_pref && s.format_pref.length) FORMATS = s.format_pref.slice();
  }
  // Global app config + read-only search mirrors.
  if (libVm.config) {
    var c = libVm.config;
    APPCFG = {
      out_dir: c.out_dir || "",
      query_concurrency: c.query_concurrency,
      max_concurrent_downloads: c.max_concurrent_downloads || 5,
      max_attempts: c.max_attempts,
      hedge_enabled: !!c.hedge_enabled
    };
  }
  if (libVm.search_mirrors) SEARCH_MIRRORS = libVm.search_mirrors.slice();
  // Do NOT re-render the Settings sheet here: a background library refresh (e.g. the
  // coalesced reload during downloads) would otherwise clobber the user's in-progress
  // edits back to the persisted values. The sheet keeps the values it opened with;
  // collectSettings() reads them from the DOM on Save.
  render();
  return libVm;
}


/* Live per-variation download progress: update the matching variation (keyed by
   md5) in place, so the right glyph/progress bar moves without a re-query. */
/* Drag the handle on the sidebar's right edge to resize it; width persists. */
function wireSidebarResize() {
  var handle = document.getElementById("sidebarResize");
  if (!handle) return;
  try {
    var saved = parseInt(localStorage.getItem("sidebarW") || "", 10);
    if (saved >= 150 && saved <= 600) document.documentElement.style.setProperty("--sidebar-w", saved + "px");
  } catch (e) {}
  var dragging = false;
  handle.addEventListener("mousedown", function (e) {
    dragging = true; handle.classList.add("dragging");
    document.body.style.userSelect = "none"; document.body.style.cursor = "col-resize";
    e.preventDefault();
  });
  document.addEventListener("mousemove", function (e) {
    if (!dragging) return;
    var sb = document.getElementById("sidebar");
    var w = Math.max(150, Math.min(600, Math.round(e.clientX - sb.getBoundingClientRect().left)));
    document.documentElement.style.setProperty("--sidebar-w", w + "px");
  });
  document.addEventListener("mouseup", function () {
    if (!dragging) return;
    dragging = false; handle.classList.remove("dragging");
    document.body.style.userSelect = ""; document.body.style.cursor = "";
    var cur = parseInt(getComputedStyle(document.documentElement).getPropertyValue("--sidebar-w"), 10);
    try { if (cur) localStorage.setItem("sidebarW", String(cur)); } catch (e) {}
  });
}
/* Drag the active panel's TOP edge to set its (fixed) expanded height; persisted. A
   fixed height means downloads starting/finishing scroll the panel body instead of
   growing the panel — so the book list above never reflows on progress. */
function wireActivePanelResize() {
  var handle = document.getElementById("apResize");
  if (!handle) return;
  try {
    var saved = parseInt(localStorage.getItem("apH") || "", 10);
    if (saved >= 120 && saved <= 700) document.documentElement.style.setProperty("--ap-h", saved + "px");
  } catch (e) {}
  var dragging = false;
  handle.addEventListener("mousedown", function (e) {
    dragging = true; handle.classList.add("dragging");
    document.body.style.userSelect = "none"; document.body.style.cursor = "row-resize";
    e.preventDefault();
  });
  document.addEventListener("mousemove", function (e) {
    if (!dragging) return;
    var panel = document.getElementById("activePanel");
    var maxH = Math.max(200, Math.round(window.innerHeight * 0.7));
    // Top-edge drag: new height = panel bottom − cursor Y.
    var h = Math.max(120, Math.min(maxH, Math.round(panel.getBoundingClientRect().bottom - e.clientY)));
    document.documentElement.style.setProperty("--ap-h", h + "px");
  });
  document.addEventListener("mouseup", function () {
    if (!dragging) return;
    dragging = false; handle.classList.remove("dragging");
    document.body.style.userSelect = ""; document.body.style.cursor = "";
    var cur = parseInt(getComputedStyle(document.documentElement).getPropertyValue("--ap-h"), 10);
    try { if (cur) localStorage.setItem("apH", String(cur)); } catch (e) {}
  });
}
function wireProgress() {
  listen("download://progress", function (e) {
    var p = e.payload || {};
    if (p.kind === "all_done") {
      RUNNING = false;
      document.getElementById("runBtn").textContent = t("toolbar.start_all");
      refresh(); return;
    }
    noteLeg(p); // track per-leg (md5+host) state so hedge legs get their own panel line
    everyBook().forEach(function (b) {
      (b.versions || []).forEach(function (v) {
        if (v.md5 !== p.md5) return;
        // Only the variation actually REQUESTED for download in THIS list reacts to
        // a progress event. A shared md5 being downloaded by ANOTHER list must not
        // flip this list's `available` (never picked) or `done` copy — that was the
        // cross-list display bleed (book shows "downloading" in a list that didn't
        // request it; a done copy flips back to "in progress").
        if (v.state !== "queued" && v.state !== "downloading" && v.state !== "paused") return;
        if (p.kind === "resolved") { v.state = "downloading"; v.host = p.host; }
        else if (p.kind === "bytes") {
          v.state = "downloading";
          // The variation's headline tracks the PRIMARY leg (lowest live leg_id), so
          // a slower hedge leg can't drag it backwards and it never flips between
          // legs. Falls back to this event's values before any leg is registered.
          var lead = primaryLeg(p.md5) ||
            { host: p.host, bytes: p.bytes_done, total: p.total_bytes, speed: p.speed_bps, eta: p.eta_secs };
          v.host = lead.host;
          v.downloaded_bytes = lead.bytes; v.total_bytes = lead.total;
          v.speed_bps = (lead.speed != null ? lead.speed : null);
          v.eta_secs = (lead.eta != null ? lead.eta : null);
          if (lead.total) v.progress = Math.min(100, Math.round(100 * lead.bytes / lead.total));
        }
        else if (p.kind === "done") { v.state = "done"; v.progress = 100; v.output_path = p.path; }
        else if (p.kind === "failed") { v.state = "failed"; }
        else if (p.kind === "paused") { v.state = "paused"; }
        else if (p.kind === "cancelled") { v.state = "cancelled"; v.progress = 0; }
      });
    });
    // TARGETED rendering: a high-frequency BYTES/resolved event only changes the
    // active-downloads panel (+ sidebar counts + open detail), so update just those —
    // never rebuild the whole book list + its 300+ cover data-URLs on every byte.
    // Only a TERMINAL transition (done/failed/cancelled) needs the full refresh (to
    // move the row out of "active", pull fresh state, and localize new covers).
    if (p.kind === "done" || p.kind === "failed" || p.kind === "cancelled") {
      scheduleReload();
    } else {
      renderLive();
    }
  });
}

/* Live per-book transitions from the execution engine: engine://book
   {list_id, book_id, status, goal} — reflect status + goal as the engine
   advances each book toward its goal, so the list/panels tick in real time. */
function wireEngine() {
  listen("engine://book", function (e) {
    var p = e.payload || {};
    var hit = null;
    everyBook().forEach(function (b) {
      if (b.bid === p.book_id && (!p.list_id || b.list === p.list_id)) hit = b;
    });
    if (hit) {
      if (p.status) hit.discovery = p.status;
      if (p.goal) hit.goal = p.goal;
      // TARGETED update only (active panel + sidebar + detail). Do NOT rebuild the
      // book list on every engine tick — that per-event innerHTML replace is what made
      // the list flicker during downloads. The list's status chips refresh via the
      // debounced reload below (coalesced), so they still update, just not flickery.
      renderLive();
    }
    // Reconcile candidates/versions/progress from the backend (events don't carry
    // them) — fixes done-books-reading-queued and two-jobs-sharing-one-row.
    scheduleReload();
  });
  // The background integrity scan demoted some Done variations (missing files) —
  // re-pull the library so the UI reflects the new state without a manual reload.
  listen("library://refresh", function () {
    if (hasTauri()) invoke("library").then(applyLibrary).catch(function () {});
  });
}

/* Live per-book query stage: as the engine searches each book it emits
   query://book {list_id, book_id, stage}; reflect it so a row shows
   "⟳ Being queried…" and the active panel lists it, in real time. */
function wireQueryStage() {
  listen("query://book", function (e) {
    var p = e.payload || {};
    var hit = null;
    everyBook().forEach(function (b) {
      if (b.bid === p.book_id && (!p.list_id || b.list === p.list_id)) hit = b;
    });
    if (hit && p.stage) { hit.discovery = p.stage; renderList(); renderActivePanel(); renderDetail(); }
    scheduleReload(); // pull the freshly-found candidates/versions into the view
  });
}

/* Show/hide the "searching mirrors" indicator while a query is in flight. */
function setQuerying(on, msg) {
  var el = document.getElementById("queryBar");
  if (!el) return;
  if (on) {
    el.innerHTML = '<span class="qspin"></span><span>' + esc(msg || "Searching mirrors for matches…") + '</span>';
    el.classList.remove("hide");
  } else {
    el.classList.add("hide");
  }
}

/* Re-query: re-run matching on un-downloaded books with the latest algorithm,
   preserving anything already downloaded/queued (no wasted bandwidth). */
/* Save a corrected title/author and re-query just this book. */
function onEditBook(bk, title, author) {
  if (!bk) return;
  if (!title || !title.trim()) { toast("Title can't be empty."); return; }
  EDIT_BOOK = null;
  if (!hasTauri()) { bk.title = title.trim(); bk.author = author; render(); return; }
  invoke("edit_book", { listId: listArg(bk.list), bookId: bk.bid, title: title.trim(), author: author || "" })
    .then(applyLibrary)
    .catch(function (err) { toast("Couldn't update: " + (errText(err) || "unknown error")); });
}

/* "Search again" on a single book: re-query JUST that book (the per-book `retry`
   command — reset to Queued + re-arm goal). NOT the per-list re-query, which would
   re-discover every not-found book in the list. */
function onSearchAgain(bk) {
  if (!bk || !hasTauri()) return;
  invoke("retry", { listId: listArg(bk.list), bookId: bk.bid }).then(applyLibrary)
    .catch(function (err) { toast("Search again failed: " + (errText(err) || "unknown error")); });
}
function onRequery(listId) {
  listId = listId || CURRENT;
  if (!listId || listId === "__all__") { alert(t("err.select_list_requery")); return; }
  if (!hasTauri()) { setQuerying(true, "Re-querying…"); setTimeout(function () { setQuerying(false); }, 600); return; }
  setQuerying(true, "Re-querying this list with the latest matching…");
  invoke("requery", { listId: listArg(listId) })
    .then(applyLibrary)
    .catch(function (err) { console.error("requery failed:", err && err.message); })
    .finally(function () { setQuerying(false); });
}

/* ---- list right-click context menu (per-list actions) ---- */
var CTX_LIST = null;
function hideCtxMenu() { var m = document.getElementById("ctxMenu"); if (m) m.classList.add("hide"); CTX_LIST = null; }
function showCtxMenu(x, y, listId, listName) {
  CTX_LIST = listId;
  var m = document.getElementById("ctxMenu");
  m.innerHTML =
    '<div class="ctx-head">' + esc(listName || "List") + '</div>' +
    '<button data-ctx="start">' + esc(t("ctx.start_downloads")) + '</button>' +
    '<button data-ctx="pause">' + esc(t("ctx.pause_downloads")) + '</button>' +
    '<button data-ctx="requery">' + esc(t("ctx.requery")) + '</button>' +
    '<button data-ctx="remove" class="ctx-danger">' + esc(t("ctx.remove_list")) + '</button>';
  m.classList.remove("hide");
  // Keep the menu on-screen.
  var w = m.offsetWidth || 180, h = m.offsetHeight || 120;
  m.style.left = Math.min(x, window.innerWidth - w - 6) + "px";
  m.style.top = Math.min(y, window.innerHeight - h - 6) + "px";
}
document.addEventListener("contextmenu", function (e) {
  var li = e.target.closest(".side-item[data-list]");
  if (!li) { hideCtxMenu(); return; }
  var id = li.getAttribute("data-list");
  if (id === "__all__") { hideCtxMenu(); return; } // aggregate has no per-list actions
  e.preventDefault();
  showCtxMenu(e.clientX, e.clientY, id, (li.querySelector(".lbl") || {}).textContent);
});
document.addEventListener("click", function (e) {
  var b = e.target.closest("#ctxMenu [data-ctx]");
  if (b) {
    var id = CTX_LIST, act = b.getAttribute("data-ctx");
    hideCtxMenu();
    if (!id) return;
    if (act === "start") startListDownloads(id);
    else if (act === "pause") pauseListDownloads(id);
    else if (act === "requery") onRequery(id);
    else if (act === "remove") removeList(id);
    return;
  }
  if (!e.target.closest("#ctxMenu")) hideCtxMenu(); // click elsewhere closes
});
document.addEventListener("keydown", function (e) { if (e.key === "Escape") hideCtxMenu(); });

/* Keyboard navigation of the book list: ↑/↓ (or k/j) move the selection through
   the visible books; if the detail panel is open it refreshes to the new book
   (render() re-renders it). Enter toggles the detail panel. Ignored while typing
   in a field or when a modal sheet is open. */
document.addEventListener("keydown", function (e) {
  var tag = (e.target && e.target.tagName) || "";
  if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT" || (e.target && e.target.isContentEditable)) return;
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  // Don't hijack arrows while a sheet/modal is open (let it scroll).
  var modalOpen = ["sheet", "settingsSheet", "histSheet"].some(function (id) {
    var el = document.getElementById(id); return el && el.classList.contains("open");
  });
  if (modalOpen) return;

  var down = (e.key === "ArrowDown" || e.key === "j");
  var up = (e.key === "ArrowUp" || e.key === "k");
  if (down || up) {
    var books = visibleBooks();
    if (!books.length) return;
    var idx = -1;
    for (var i = 0; i < books.length; i++) if (books[i].id === SELECTED) { idx = i; break; }
    if (idx < 0) idx = down ? -1 : books.length;          // start at an edge
    var ni = Math.max(0, Math.min(books.length - 1, idx + (down ? 1 : -1)));
    SELECTED = books[ni].id;
    e.preventDefault();
    render();                                              // refreshes detail if open
    var sel = document.querySelector(".book.sel");
    if (sel && sel.scrollIntoView) sel.scrollIntoView({ block: "nearest" });
  } else if (e.key === "Enter" && SELECTED) {
    DETAIL_COLLAPSED = !DETAIL_COLLAPSED;                  // toggle the detail panel
    e.preventDefault();
    render();
  }
});

/* Re-query + match the active list, then apply the refreshed library. */
function refresh() {
  if (!hasTauri()) return Promise.resolve();
  setQuerying(true);
  return invoke("query_and_match", { listId: listArg(CURRENT) })
    .then(applyLibrary)
    .catch(function () {})
    .finally(function () { setQuerying(false); });
}

/* Debounced READ-ONLY reconcile with the backend's true state. Engine events
   (engine://book / download://progress) only carry status+goal+per-md5 progress;
   they do NOT carry a book's candidates/versions. So after a query populates a
   book's variations, or a download finishes, the in-memory copy drifts (a done
   book reads as "queued" with empty versions; two download jobs can't be told
   apart). A short debounce after any engine event reloads the full ViewLibrary
   (no re-query — the read-only `library` projection) and applyLibrary reconciles
   everything: candidates, per-variation states, progress, done/queued. */
var _reloadTimer = null;
/* Coalesced full refresh from the engine/DB: pulls fresh per-book state AND
   freshly-localized cover URLs (the background backfill writes them to the DB;
   the in-memory LISTS would otherwise lag, leaving downloaded books on
   placeholders). Debounced so a burst of progress events triggers ONE reload
   (no per-event DOM rebuild → no flicker), and deferred while the user is
   selecting text (applyLibrary re-renders, which would clear the selection). */
function scheduleReload() {
  if (!hasTauri() || _reloadTimer) return;
  _reloadTimer = setTimeout(function () {
    _reloadTimer = null;
    if (isSelectingText()) { scheduleReload(); return; } // try again once selection clears
    invoke("library").then(applyLibrary).catch(function () {});
  }, 1000);
}

/* Seed Tauri with a sample markdown list so the app opens with content. */
function mdSample() {
  var l = LISTS[0];
  var out = "# " + l.title + "\n\n";
  l.groups.forEach(function (g) {
    out += "## " + g.name + "\n";
    g.books.forEach(function (b) { out += "- " + b.title + " — " + b.author + "\n"; });
    out += "\n";
  });
  return out;
}

function markReady() { document.documentElement.setAttribute("data-ready", "1"); }

/* boot */
function boot() {
  wireImportDrop();
  if (hasTauri()) {
    // The engine is the source of truth: start EMPTY (no demo data), then load
    // whatever is persisted. A fresh DB stays empty, waiting for the user to
    // import a list — we never seed sample books.
    LISTS = []; CURRENT = "__all__";
    render();
    wireProgress();
    wireQueryStage();
    wireEngine();
    wireSidebarResize();
    wireActivePanelResize();
    // Settings lives in the native app menu (⌘,) — open the sheet when fired.
    listen("menu://settings", function () { openSettings(); });
    // Launch is PAUSED: just load + show the persisted state. The engine does
    // nothing until the user Starts or Re-queries a list — no auto-download.
    invoke("library")
      .then(function (lib) { applyLibrary(lib || { lists: [], current: "__all__" }); })
      .catch(function (err) { console.error("boot failed:", err && err.message); })
      .finally(markReady);
  } else {
    // file:// prototype/headless: keep the bundled demo data so the UI is demoable.
    render();
    markReady();
  }
}
/* Wire the import dropzone (drag & drop a .md/.json onto it). */
function wireImportDrop() {
  var dz = document.getElementById("dropzone");
  if (!dz) return;
  ["dragover", "dragenter"].forEach(function (ev) {
    dz.addEventListener(ev, function (e) { e.preventDefault(); dz.classList.add("drag"); });
  });
  ["dragleave", "drop"].forEach(function (ev) {
    dz.addEventListener(ev, function (e) { e.preventDefault(); dz.classList.remove("drag"); });
  });
  dz.addEventListener("drop", function (e) {
    readImportFile(e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0]);
  });
}

/* expose a tiny hook so the headless test can assert state deterministically */
window.__APP__ = {
  counts: counts, globalCounts: globalCounts,
  lists: function () { return LISTS; },
  getCurrent: function () { return CURRENT; },
  setCurrent: function (id) { CURRENT = id; FILTER = "all"; FMT_FILTER = ""; SELECTED = null; render(); },
  getFilter: function () { return FILTER; }, getSelected: function () { return SELECTED; },
  getSettings: function () { return SETTINGS; }, getAppCfg: function () { return APPCFG; },
  getFormats: function () { return FORMATS; },
  openSettings: openSettings, // Settings is in the native app menu (⌘,); hook for tests
  hasTauri: hasTauri, refresh: refresh
};

boot();
</script>
</body>
</html>
