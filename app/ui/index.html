}

function renderFilters() {
  // Chip counts use the SAME category test as the filter (inCategory), so a Done+Failed
  // book is counted under both "Done" and "Cannot download" — matching what clicking the
  // chip shows. (The toolbar progress bar still uses the single-status partition.)
  var books = (CURRENT === "__all__" ? everyBook() : listBooks(currentList()));
  // Per-SELECTED-VARIATION counts: a book's copies are counted independently, so a book
  // with a Done copy AND an in-progress (or queued/failed) copy is counted under EACH —
  // done+active+queued+cantdl sums to the number of selected variations. needs/review are
  // book-level (a book that has no selected variation in the download lifecycle yet).
  var c = { all: books.length, needs: 0, review: 0, cantdl: 0, active: 0, done: 0, queued: 0 };
  books.forEach(function (b) {
    var es = effectiveStatus(b);
    if (es === "needs") c.needs++;
    if (es === "review") c.review++;
    var n = 0, failed = 0;
    requestedVersions(b).forEach(function (v) {
      if (v.state === "done") { c.done++; n++; }
      else if (v.state === "downloading" || v.state === "paused") { c.active++; n++; }
      else if (v.state === "queued") { c.queued++; n++; }
      else if (v.state === "failed") { c.cantdl++; n++; failed++; }
    });
    // "Cannot download" must include NOT-FOUND books too: those have no candidates (no
    // variation to count above), so count the book once when it rolls up to cantdl and
    // had no failed variation already counted. (A book with a Done copy + a Failed copy
    // is still counted via its failed variation above, exactly like the filter shows.)
    if (es === "cantdl" && failed === 0) c.cantdl++;
    if (n === 0 && es === "queued") c.queued++; // queued for query — no variation yet
  });
  var el = document.getElementById("filters");
  function chip(key, label, n) {
    var extra = (key === "needs" || key === "review") ? " attn" : (key === "cantdl" ? " cantdl" : "");
    return '<button class="chip' + extra + (FILTER === key ? " active" : "") + '" data-filter="' + key + '">' +
      esc(label) + (n != null ? ' <span class="n">' + n + '</span>' : '') + '</button>';
  }
  var fmts = formatsInView();
  var fmtChips = fmts.length
    ? '<span style="opacity:.4;margin:0 4px">|</span>' + fmts.map(function (f) {
        return '<button class="chip' + (FMT_FILTER === f ? " active" : "") + '" data-fmtfilter="' + f +
          '" title="Show only books with a ' + f.toUpperCase() + ' copy" style="color:' + fmtColor(f) +
          (FMT_FILTER === f ? ";border-color:" + fmtColor(f) : "") + '">' + f.toUpperCase() + '</button>';
      }).join("")
    : "";
  el.innerHTML =
    chip("all", "All", c.all) +
    chip("needs", "Needs you", c.needs) +
    chip("review", "Check download", c.review) +
    chip("cantdl", "Cannot download", c.cantdl) +
    chip("active", "In progress", c.active) +
    chip("done", "Done", c.done) +
    chip("queued", "Queued", c.queued) +
    fmtChips;
}

function groupHeader(key, name, doneN, total, collapsed) {
  return '<div class="group-h' + (collapsed ? " collapsed" : "") + '" data-toggle="' + key + '">' +
    '<span class="tw">▾</span><span class="gname">' + esc(name) + '</span>' +
    '<span class="gcount">' + doneN + " / " + total + '</span></div>';
}
function renderList() {
  var wrap = document.getElementById("listwrap");
  var html = "", shown = 0;
  if (CURRENT === "__all__") {
    // Aggregate: one collapsible section per list.
    LISTS.forEach(function (l, li) {
      var books = listBooks(l), visible = books.filter(matchesFilter);
      if (visible.length === 0) return;
      var doneN = books.filter(function (b) { return effectiveStatus(b) === "done"; }).length;
      html += groupHeader("L" + li, l.title, doneN, books.length, l.collapsedAll);
      if (!l.collapsedAll) visible.forEach(function (bk) { shown++; html += bookRow(bk); });
    });
  } else {
    // Single list: one collapsible section per batch.
    currentList().groups.forEach(function (g, gi) {
      var visible = g.books.filter(matchesFilter);
      if (visible.length === 0) return;
      var doneN = g.books.filter(function (b) { return effectiveStatus(b) === "done"; }).length;
      html += groupHeader("G" + gi, g.name, doneN, g.books.length, g.collapsed);
      if (!g.collapsed) visible.forEach(function (bk) { shown++; html += bookRow(bk); });
    });
  }
  if (shown === 0) html = '<div class="empty">Nothing here for this filter.</div>';
  // Diff-guard: only touch the DOM when the (progress-free) markup actually changed,
  // so a reload that finds nothing structurally different doesn't re-replace the list
  // (re-decoding covers, flickering). Live download bars are filled in place below.
  if (wrap.__ph !== html) { wrap.__ph = html; wrap.innerHTML = html; }
  updateRowProgress();
}

/* Fill the live download bar + % on each active row IN PLACE — no list rebuild, so
   progress ticks smoothly without flicker. Called from renderLive() (≤4 fps) and after
   each renderList(). */
function updateRowProgress() {
  // Per-VARIATION bars: each downloading variation line carries data-vprog="bookId:md5".
  var nodes = document.querySelectorAll("#listwrap [data-vprog]");
  if (!nodes.length) return;
  var byId = {};
  everyBook().forEach(function (b) { byId[b.id] = b; });
  nodes.forEach(function (el) {
    var dp = el.getAttribute("data-vprog"); var sep = dp.indexOf(":");
    var bk = byId[dp.slice(0, sep)]; if (!bk) return;
    var md5 = dp.slice(sep + 1);
    var v = (bk.versions || []).filter(function (x) { return x.md5 === md5; })[0];
    if (!v) return;
    var pct = v.state === "done" ? 100 : (v.progress || 0);
    var bar = el.querySelector(".vbar i"); if (bar) bar.style.width = pct + "%";
    var pc = el.querySelector(".vpct"); if (pc) pc.textContent = pct + "%";
  });
}

function requestedVersions(bk) { return (bk.versions || []).filter(function (v) { return v.state !== "available"; }); }
function rollup(bk) {
  var req = requestedVersions(bk);
  return { requested: req.length, done: req.filter(function (v) { return v.state === "done"; }).length };
}
function uniqueFormats(versions) {
  var seen = {}, out = [];
  (versions || []).forEach(function (v) { if (!seen[v.fmt]) { seen[v.fmt] = 1; out.push(v.fmt); } });
  return out;
}

/* A representative file size for the book's row: prefer the downloaded copy, then
   the recommended one, then the top candidate. "" when no candidate has a size. */
function bookSize(bk) {
  var vs = bk.versions || [];
  var v = vs.filter(function (x) { return x.state === "done"; })[0]
    || vs.filter(function (x) { return x.md5 === bk.recommended_md5; })[0]
    || vs[0];
  return (v && v.size) ? (v.size + " MB") : "";
}

/* Cover image URL for the book: downloaded copy → recommended → any with a cover. */
function bookCover(bk) {
  var vs = bk.versions || [];
  var v = vs.filter(function (x) { return x.state === "done" && x.cover_url; })[0]
    || vs.filter(function (x) { return x.md5 === bk.recommended_md5 && x.cover_url; })[0]
    || vs.filter(function (x) { return x.cover_url; })[0];
  return (v && v.cover_url) ? v.cover_url : "";
}
/* A cover <img> (lazy; swaps to a format-colored placeholder on 404), or the
   placeholder directly when no cover URL is known. `cls` = "cv-sm" | "cv-lg". */
function coverImg(bk, cls) {
  var fmts = uniqueFormats(bk.versions), f = fmts[0] || "";
  var ph = '<span class="cover ' + cls + ' cover-ph" style="background:' + fmtColor(f) +
    '22;color:' + fmtColor(f) + '">' + esc((f || "?").toUpperCase().slice(0, 4)) + '</span>';
  var url = coverSrc(bookCover(bk));
  if (!url) return ph;
  // loading="lazy" + decoding="async": a long list re-rendered during downloads must
  // NOT synchronously decode every off-screen cover data-URL (that clogs the decode
  // queue and makes covers lag / flicker). Off-screen covers decode when scrolled in.
  return '<img class="cover ' + cls + '" loading="lazy" decoding="async" src="' + esc(url) + '" ' +
    "onerror=\"this.outerHTML='" +
    ph.replace(/'/g, "&#39;").replace(/"/g, "&quot;") + "'\">";
}

/* Resolve a cover value to a usable <img src>. Remote http(s) URLs are used as-is;
   a LOCAL absolute path (a cached thumbnail) is served through Tauri's asset
   protocol via convertFileSrc so the webview can load it. */
function coverSrc(url) {
  if (!url) return "";
  if (/^https?:/i.test(url)) return url; // remote: load directly
  // Local cached thumbnail: use the data URL once hydrateCovers has fetched it
  // (empty string → placeholder until then, or if it failed).
  var c = COVER_CACHE[url];
  return (typeof c === "string" && c) ? c : "";
}
/* The per-format glyph strip: each REQUESTED variation as `fmt<glyph>` colored
   by its own state. Before any download, show the available formats faintly. */
function variationGlyphs(bk) {
  // A cancelled variation was abandoned by the user (e.g. dropped in favor of a
  // better copy) — don't keep showing it as an active chip in the list row. It
  // stays visible in the detail variation manager (re-downloadable).
  var req = requestedVersions(bk).filter(function (v) { return v.state !== "cancelled"; });
  if (req.length === 0) {
    return uniqueFormats(bk.versions).map(function (f) { return '<span class="fmt" style="color:' + fmtColor(f) + '">' + f + '</span>'; }).join(" ");
  }
  return req.map(function (v) {
    // Format → text color; download state → background tint (vg-*) + trailing glyph.
    var cls = v.state === "done" ? "vg-done" : (v.state === "failed" ? "vg-fail" : "vg-active");
    return '<span class="vg ' + cls + '" style="color:' + fmtColor(v.fmt) + '">' +
      v.fmt + " " + (FMT_GLYPH[v.state] || "") + '</span>';
  }).join(" ");
}

/* Overall download percent across a book's requested variations (done = 100). */
function downloadPct(bk) {
  var r = requestedVersions(bk);
  if (!r.length) return 0;
  var s = 0;
  r.forEach(function (v) { s += v.state === "done" ? 100 : (v.progress || 0); });
  return Math.round(s / r.length);
}

/* One variation's status cell. An ANIMATED hourglass = actively downloading; a
   still hourglass = queued/waiting — so the two are visually distinct. */
function varStatusCell(v) {
  if (v.state === "done") return '<span class="vstat" style="color:var(--green)">✓ Done</span>';
  if (v.state === "downloading")
    return '<span class="vstat" style="color:var(--accent)"><span class="hourglass run">⏳</span> <span class="vpct">…</span></span>';
  if (v.state === "paused")
    return '<span class="vstat">⏸ Paused' + (v.progress ? ' ' + v.progress + '%' : '') + '</span>';
  if (v.state === "failed") return '<span class="vstat" style="color:var(--red)">⚠ Failed</span>';
  if (v.state === "queued") return '<span class="vstat"><span class="hourglass">⏳</span> Queued</span>';
  return '<span class="vstat">' + esc(v.state) + '</span>';
}
/* One variation's progress bar. Live (downloading) rows bake width:0% so the list
   markup stays STABLE byte-to-byte (the diff-guard skips the rebuild); the live %
   is filled in place by updateRowProgress on the [data-vprog] line. */
function varProgCell(v) {
  if (v.state === "done") return '<span class="vbar"><i style="width:100%;background:var(--green)"></i></span>';
  if (v.state === "downloading") return '<span class="vbar"><i style="width:0%"></i></span>';
  if (v.state === "paused") return '<span class="vbar"><i style="width:' + (v.progress || 0) + '%"></i></span>';
  return '<span class="vbar empty"></span>';
}
function varLine(bk, v) {
  var dp = v.state === "downloading" ? ' data-vprog="' + esc(bk.id) + ":" + esc(v.md5) + '"' : '';
  return '<div class="vline"' + dp + '>' +
    '<span class="vt" style="color:' + fmtColor(v.fmt) + '">' + esc(v.fmt) + '</span>' +
    '<span class="vsz">' + (v.size ? v.size + ' MB' : '—') + '</span>' +
    varStatusCell(v) + varProgCell(v) + '</div>';
}
/* The per-variation region of a book row: one line per REQUESTED variation
   (type · size · status · progress, stacked vertically). A book with no requested
   variation (querying / needs / not-found / queued-for-query) shows one book-level
   status line instead. */
function variationLines(bk) {
  var req = requestedVersions(bk).filter(function (v) { return v.state !== "cancelled"; });
  if (req.length === 0) {
    var es = effectiveStatus(bk), txt, cls;
    if (es === "querying") { txt = '<span class="hourglass run">⟳</span> Being queried…'; cls = "s-active"; }
    else if (es === "needs") { txt = "Choose a copy"; cls = "s-attn"; }
    else if (es === "review") { txt = "Check download"; cls = "s-attn"; }
    else if (es === "cantdl") { txt = bk.discovery === "not_found" ? "Not found" : "Failed"; cls = "s-fail"; }
    else { txt = bk.priority ? "⤴ Next up" : "Queued for query"; cls = bk.priority ? "s-active" : "s-queued"; }
    return '<div class="vlist"><div class="vline bookline"><span class="chip-s ' + cls + '">' + txt + '</span></div></div>';
  }
  return '<div class="vlist">' + req.map(function (v) { return varLine(bk, v); }).join("") + '</div>';
}
/* The optional book-level action button (Choose / Review / Top), shown in the
   row's action column. Empty otherwise. */
function rowAction(bk) {
  var es = effectiveStatus(bk);
  if (es === "needs") return '<button class="rowbtn amber" data-open="' + bk.id + '">Choose…</button>';
  if (es === "review") return '<button class="rowbtn amber" data-open="' + bk.id + '">Review…</button>';
  if (es === "queued" && (bk.versions && bk.versions.length)) {
    return '<button class="rowbtn' + (bk.priority ? " amber" : "") + '" data-top="' + bk.id +
      '" title="Move to top of queue">' + (bk.priority ? "✓ Top" : "⤒ Top") + '</button>';
  }
  return '<span></span>';
}

function bookRow(bk) {
  return '<div class="book' + (SELECTED === bk.id ? " sel" : "") + '" data-open="' + bk.id + '">' +
    '<span class="seq">' + bk.seq + '</span>' +
    coverImg(bk, "cv-sm") +
    '<span class="meta"><div class="t">' + esc(bk.title) + '</div><div class="a">' + esc(bk.author) + '</div></span>' +
    variationLines(bk) + rowAction(bk) + '</div>';
}

function fmtBytes(n) {
  if (n == null) return "—";
  if (n >= 1048576) return (n / 1048576).toFixed(1) + " MB";
  if (n >= 1024) return (n / 1024).toFixed(0) + " KB";
  return n + " B";
}
function fmtSpeed(bps) { return bps == null ? "—" : fmtBytes(bps) + "/s"; }
function fmtEta(secs) {
  if (secs == null) return "—";
  if (secs >= 3600) return Math.floor(secs / 3600) + "h " + Math.floor((secs % 3600) / 60) + "m";
  if (secs >= 60) return Math.floor(secs / 60) + "m " + (secs % 60) + "s";
  return secs + "s";
}

/* The bottom panel: everything in flight right now — books being queried, and
   variations being downloaded (with progress, speed, ETA). Collapsible. */
/* Per-leg live download state for the active panel. With hedging ON, ONE variation
   (md5) races on multiple hosts (LEGS); the progress events carry (md5, host), so we
   track each leg separately and show it on its OWN line. The FIRST host seen for an
   md5 is the PRIMARY; later ones are HEDGE legs (badged). Cleared on the variation's
   terminal event; a leg with no update for LEG_TTL ages out (covers a leg that
   failed over / lost without an explicit event). */
var LEGS = {};                 // md5 -> { order: [host,...], byHost: { host -> leg } }
var LEG_TTL = 6000;            // ms; a leg silent this long is dropped (e.g. a lost race leg)

function noteLeg(p) {
  if (!p.md5) return;
  if (p.kind === "done" || p.kind === "failed" || p.kind === "cancelled") { delete LEGS[p.md5]; return; }
  if (p.kind === "failing_over") {
    // SEQUENTIAL host change (not a parallel hedge): the old host is dead — drop it
    // so the new host isn't mistaken for a speculative leg of a still-running primary.
    var Lf = LEGS[p.md5];
    if (Lf && p.from_host) {
      delete Lf.byHost[p.from_host];
      Lf.order = Lf.order.filter(function (h) { return h !== p.from_host; });
    }
    return;
  }
  if ((p.kind !== "bytes" && p.kind !== "resolved") || !p.host) return;
  var L = LEGS[p.md5] || (LEGS[p.md5] = { order: [], byHost: {} });
  var prev = L.byHost[p.host];
  if (!prev) L.order.push(p.host);
  var prog = p.total_bytes ? Math.min(100, Math.round(100 * p.bytes_done / p.total_bytes)) : (prev ? prev.progress : 0);
  L.byHost[p.host] = {
    host: p.host,
    bytes: (p.bytes_done != null ? p.bytes_done : (prev ? prev.bytes : null)),
    total: (p.total_bytes != null ? p.total_bytes : (prev ? prev.total : null)),
    speed: (p.kind === "bytes" ? (p.speed_bps != null ? p.speed_bps : null) : (prev ? prev.speed : null)),
    eta: (p.kind === "bytes" ? (p.eta_secs != null ? p.eta_secs : null) : (prev ? prev.eta : null)),
    progress: prog,
    ts: Date.now(),
  };
}

/* The legs to show for a downloading variation: live per-leg state when we have it
   (a hedge race), else ONE leg synthesized from the viewmodel (no hedging / no
   events yet). Each leg is tagged `hedge` (a non-primary host) for the badge. */
function legsFor(v) {
  var L = LEGS[v.md5], now = Date.now();
  if (L && L.order.length) {
    var fresh = L.order.filter(function (h) { return (now - (L.byHost[h].ts || 0)) < LEG_TTL; });
    if (fresh.length) {
      // hedge = a CONCURRENT secondary: only legs that are still active count, so a
      // sequential failover (old leg gone) leaves the new leg as the sole PRIMARY.
      return fresh.map(function (h, i) { var leg = L.byHost[h]; leg.hedge = i > 0; return leg; });
    }
  }
  return [{ host: v.host, bytes: v.downloaded_bytes, total: v.total_bytes,
    speed: v.speed_bps, eta: v.eta_secs, progress: v.progress, hedge: false }];
}

function renderActivePanel() {
  var panel = document.getElementById("activePanel");
  panel.classList.toggle("collapsed", ACTIVE_COLLAPSED);

  var querying = [], downloading = [], seenMd5 = {};
  everyBook().forEach(function (b) {
    if (b.discovery === "querying") querying.push(b);
    (b.versions || []).forEach(function (v) {
      if (v.state !== "downloading" && v.state !== "paused") return;
      // One row per md5: the same file selected by two book entries (e.g. a book
      // duplicated across lists, or a mistaken same-file selection) is ONE underlying
      // download job — show it once, not as two rows that share progress and flicker.
      // The top "in progress" chip stays per-variation, so its count may exceed the
      // rows here; that discrepancy is expected and acceptable.
      if (v.md5) { if (seenMd5[v.md5]) return; seenMd5[v.md5] = true; }
      downloading.push({ bk: b, v: v });
    });
  });

  // Expand each downloading variation into its LEGS — with hedging on, one variation
  // races on several hosts, each shown on its OWN line (hedge legs badged).
  var legList = [];
  downloading.forEach(function (d) {
    legsFor(d.v).forEach(function (leg) { legList.push({ bk: d.bk, v: d.v, leg: leg }); });
  });
  // A leg is actively TRANSFERRING once it lands on a cdn edge (host recorded after
  // the 307) OR bytes measurably flow; otherwise it's still CONNECTING (on the mirror).
  function legTransferring(v, leg) {
    return v.state === "downloading" &&
      (/\.booksdl\.lc$/.test(leg.host || "") || (leg.speed || 0) > 0);
  }
  var active = 0, connecting = 0, paused = 0;
  legList.forEach(function (item) {
    if (item.v.state === "paused") paused++;
    else if (legTransferring(item.v, item.leg)) active++;
    else connecting++;
  });
  // "downloading" = actively transferring bytes (from a capped cdn edge). Everything
  // BEFORE bytes flow — resolving the mirror, following the 307, opening the stream — is
  // counted as CONNECTING. Connecting is uncapped (bounded only by total download
  // concurrency), so it is deliberately NOT folded into the "downloading" number.
  document.getElementById("apSummary").textContent =
    querying.length + " querying · " + active + " downloading" +
    (connecting ? " · " + connecting + " connecting" : "") +
    (paused ? " · " + paused + " paused" : "");

  // Per-host slots: filled by ACTIVELY-transferring legs (capped at the host
  // concurrency); connecting/paused legs shown as a parenthetical, not as "on" slots.
  // Slots shown per host = the PER-EDGE concurrency cap (download::MAX_CONCURRENT_PER_EDGE),
  // since downloads are grouped by the cdnN edge serving them — not the global cap.
  // The slot-dots header is ONLY for the capped cdn edges that are actively serving
  // bytes. Connecting legs sit on the uncapped mirror (no per-host slot), so they're
  // excluded here — they appear per-task in the rows below ("connecting via …").
  var byHost = {}, cap = 3;
  legList.forEach(function (item) {
    // ONLY legs that landed on a capped cdn edge hold a per-edge slot. A leg still on the
    // mirror (connecting) holds no permit — exclude it from the slot dots regardless of
    // its byte count (which is just the resume offset of a partial).
    if (!/\.booksdl\.lc$/.test(item.leg.host || "")) return;
    (byHost[item.leg.host] || (byHost[item.leg.host] = { active: 0 })).active++;
  });
  document.getElementById("apHosts").innerHTML = Object.keys(byHost).map(function (h) {
    var b = byHost[h], slots = "", taken = Math.min(b.active, cap);
    for (var i = 0; i < cap; i++) slots += '<i class="' + (i < taken ? "on" : "") + '"></i>';
    return '<span class="host"><span class="slots">' + slots + '</span>' + esc(h) +
      ' <span style="opacity:.7">' + b.active + "/" + cap + '</span></span>';
  }).join("");

  if (ACTIVE_COLLAPSED) return; // body hidden — skip building it

  var html = '<div class="ap-sec">Being queried (' + querying.length + ')</div>';
  if (!querying.length) html += '<div class="ap-empty">Nothing being queried.</div>';
  querying.forEach(function (b) {
    html += '<div class="ap-row"><span class="nm">' + esc(b.title) +
      ' <small>' + esc(b.author) + '</small></span>' +
      '<span class="ap-bar"><i style="width:40%"></i></span>' +
      '<span class="ap-stats">searching…</span></div>';
  });

  // List every active leg with WHAT it's doing: the mirror it's on, and either
  // "connecting…" (slot held, resolving/opening the stream — no bytes yet) or a
  // live progress bar + speed/ETA once bytes flow. (Genuinely-queued books with
  // no worker aren't here — they read "Queued" in the main list.)
  html += '<div class="ap-sec">Downloading (' + active +
    (connecting ? ' · ' + connecting + ' connecting' : '') +
    (paused ? ' · ' + paused + ' paused' : '') + ')</div>';
  if (!legList.length) html += '<div class="ap-empty">No active downloads.</div>';
  legList.forEach(function (item) {
    var v = item.v, leg = item.leg;
    var pct, stats, barCls = "", host = leg.host ? ' <small>· ' + esc(leg.host) + '</small>' : '';
    if (v.state === "paused") {
      pct = leg.progress || 0;
      stats = "paused";
    } else if (legTransferring(v, leg)) {
      pct = leg.progress || 0;
      stats = fmtSpeed(leg.speed) + " · " + fmtEta(leg.eta);
    } else {
      // Not transferring yet: resolving the mirror, following the 307, rotating edges.
      // A partial already on disk (a resume) shows its %, never a 0% restart bar.
      pct = leg.progress || 0;
      if (pct > 0) {
        stats = "resuming " + pct + "% · connecting via " + (leg.host || "mirror");
      } else {
        stats = "connecting via " + (leg.host || "mirror");
        barCls = " indet";
      }
      host = ""; // already named in the stats — don't repeat it
    }
    // A HEDGE leg (speculative copy racing the primary on another host) is badged so
    // it's clearly the secondary, not a second book.
    var badge = leg.hedge ? '<span class="hedge-badge" title="hedge: speculative copy racing on another host">H</span> ' : '';
    var bytes = (leg.bytes != null && leg.total != null)
      ? ' <small>' + fmtBytes(leg.bytes) + " / " + fmtBytes(leg.total) + '</small>' : "";
    html += '<div class="ap-row"><span class="nm">' + badge + esc(item.bk.title) +
      ' <small>· </small>' + fmtLabel(v.fmt) + host + bytes + '</span>' +
      '<span class="ap-bar' + barCls + '"><i style="width:' + pct + '%"></i></span>' +
      '<span class="ap-stats">' + esc(stats) + '</span></div>';
  });
  document.getElementById("apBody").innerHTML = html;
}

/* The per-variation manager: each kept variation (distinct md5) with its OWN
   state + action, so the user can download the epub and pdf independently, or
   re-download a different copy if one isn't ideal. */
function renderVariationManager(bk) {
  if (!bk.versions || !bk.versions.length) return "";
  var html = '<div class="sec-t">Variations (' + bk.versions.length + ')</div>';
  bk.versions.forEach(function (v, idx) {
    var label = "", action;
    // Drop a copy that doesn't belong (e.g. a wrong-book file picked by mistake).
    // remove_variation drops the candidate AND dismisses the md5 so a re-query won't
    // resurface it. Only Done copies have a file to Trash; here there's none.
    var removeBtn = ' <button class="tbtn" data-remove="' + bk.id + ':' + v.md5 +
      '" title="Remove this copy from the book">✕ Remove</button>';
    if (v.state === "done") {
      label = '<span class="chip-s s-done">✓ Downloaded</span>';
      action = '<button class="tbtn" data-reveal="' + esc(v.output_path || "") + '">Reveal</button>' +
        '<button class="tbtn" data-dl="' + bk.id + ':' + idx + '">Re-download</button>' +
        '<button class="tbtn" data-remove="' + bk.id + ':' + v.md5 + '" title="Move the file to Trash and remove this download">🗑 Remove</button>';
    } else if (v.state === "downloading" || v.state === "queued") {
      label = '<span class="chip-s s-active">' + (v.state === "queued" ? "Queued" : v.progress + "%") + '</span>';
      // An in-flight/queued variation can be paused (resumable) or cancelled.
      action =
        '<button class="tbtn" data-pausev="' + bk.id + ':' + idx + '">❚❚ Pause</button>' +
        '<button class="tbtn" data-canceldl="' + bk.id + ':' + idx + '">Cancel</button>';
    } else if (v.state === "paused") {
      label = '<span class="chip-s s-queued">Paused' + (v.progress ? " · " + v.progress + "%" : "") + '</span>';
      action =
        '<button class="tbtn primary" data-resumev="' + bk.id + ':' + idx + '">▶ Resume</button>' +
        '<button class="tbtn" data-canceldl="' + bk.id + ':' + idx + '">Cancel</button>';
    } else if (v.state === "cancelled") {
      label = '<span class="chip-s s-queued">Cancelled</span>';
      action = '<button class="tbtn primary" data-dl="' + bk.id + ':' + idx + '">Download</button>' + removeBtn;
    } else if (v.state === "failed") {
      var why = v.last_error ? ' <small style="opacity:.7">· ' + esc(v.last_error) + '</small>' : '';
      label = '<span class="chip-s s-fail">Failed</span>' + why;
      action = '<button class="tbtn primary" data-dl="' + bk.id + ':' + idx + '">Retry</button>' + removeBtn;
    } else {
      // Not requested for download (a search result the user hasn't chosen, or a
      // chosen copy that was cancelled before starting). Label it so no variation
      // ever renders "without status".
      label = '<span class="chip-s s-avail">Available</span>';
      action = '<button class="tbtn primary" data-dl="' + bk.id + ':' + idx + '">Download</button>' + removeBtn;
    }
    // The candidate's OWN title/author (what the mirror returned) so the user
    // can judge whether the result is the right book.
    var idline = (v.title || v.author)
      ? '<div class="cand-id">' + esc(v.title || "—") + (v.author ? ' · ' + esc(v.author) : '') + '</div>'
      : '';
    var lang = v.language ? '<span>' + esc(v.language) + '</span>' : '';
    var pp = (v.pages != null) ? '<span>' + v.pages + ' pp</span>' : '';
    var recBadge = (bk.recommended_md5 && v.md5 === bk.recommended_md5)
      ? ' <span class="chip-s s-attn" title="Recommended replacement">★ Recommended</span>' : '';
    var matchPct = (v.score != null)
      ? '<span title="match confidence (title + author ranking)" style="font-weight:600">match ' + Math.round(v.score * 100) + '%</span>'
      : '';
    html += '<div class="cand' + (v.state === "done" ? " best" : "") + (recBadge ? " rec" : "") + '">' +
      '<div class="ct">' + fmtLabel(v.fmt) + ' · ' + v.size + ' MB ' + label + recBadge + '</div>' +
      idline +
      '<div class="cmeta">' + matchPct + '<span>' + (v.year || "—") + '</span>' + lang + pp + '<span>' + esc(v.publisher) + '</span>' +
      '<span style="opacity:.6">md5 ' + v.md5 + '</span></div>' +
      ((v.state === "downloading" || v.state === "paused") && v.progress ? '<div class="conf"><i style="width:' + v.progress + '%"></i></div>' : '') +
      '<div class="cact">' + action + '</div></div>';
  });
  return html;
}

/* A representative variation for book-level metadata: prefer a downloaded one,
   else a requested one, else the top-ranked candidate. */
function primaryVariation(bk) {
  var vs = bk.versions || [];
  return vs.filter(function (v) { return v.state === "done"; })[0]
    || vs.filter(function (v) { return v.state !== "available"; })[0]
    || vs[0] || null;
}
/* Book-level metadata rows (full title is the panel header; here: language +
   pages + format/size of the representative copy). */
function detailMeta(bk) {
  var pv = primaryVariation(bk);
  if (!pv) return "";
  var rows = '<div class="kv"><span class="k">Language</span><span class="v">' + esc(pv.language || "—") + '</span></div>' +
    '<div class="kv"><span class="k">Pages</span><span class="v">' + (pv.pages != null ? pv.pages : "—") + '</span></div>';
  if (pv.year) rows += '<div class="kv"><span class="k">Year</span><span class="v">' + pv.year + '</span></div>';
  if (pv.publisher) rows += '<div class="kv"><span class="k">Publisher</span><span class="v">' + esc(pv.publisher) + '</span></div>';
  return rows;
}

/* The event chronicle for a book + its variations (born → discovered → selected
   → downloading/retry/failover → done/failed). Oldest first. */
function fmtEventTime(ms) {
  if (!ms) return "";
  try { return new Date(ms).toLocaleString(); } catch (e) { return ""; }
}
function historyRows(bk) {
  return (bk.history || []).map(function (e) {
    var fmt = e.fmt ? '<span class="he-fmt">' + esc(String(e.fmt).toUpperCase()) + '</span> ' : '';
    return '<div class="he">' +
      '<span class="he-t">' + esc(fmtEventTime(e.at_ms)) + '</span>' +
      '<span class="he-k he-' + esc(e.kind) + '">' + esc(e.kind) + '</span>' +
      '<span class="he-d">' + fmt + esc(e.detail) + '</span></div>';
  }).join("");
}
/* Open the chronicle for a book in the history modal (oldest first). The modal
   LIVE-REFRESHES while open: the backend keeps appending events (downloading,
   retry, failover, resuming, done) to the persisted history, so we poll the
   `library` command and re-fill — the in-memory `LISTS` only refreshes on a full
   reload (done/failed), which would otherwise hide mid-download events. */
var HIST_BOOK = null, HIST_TIMER = null, HIST_SIG = "";
function findBookInVm(vm, uid) {
  // uid is the UI's globally-unique "<listId>/<backendId>"; the backend vm uses
  // the per-list backend id (bk.id) keyed under its list, so match on both.
  var slash = String(uid).indexOf("/");
  var listId = slash >= 0 ? uid.slice(0, slash) : null;
  var bid = slash >= 0 ? uid.slice(slash + 1) : uid;
  var ls = (vm && vm.lists) || [];
  for (var i = 0; i < ls.length; i++) {
    if (listId && ls[i].id !== listId) continue;
    for (var g = 0; g < (ls[i].groups || []).length; g++)
      for (var b = 0; b < (ls[i].groups[g].books || []).length; b++)
        if (ls[i].groups[g].books[b].id === bid) return ls[i].groups[g].books[b];
  }
  return null;
}
function fillHistoryFrom(bk) {
  if (!bk) return;
  // Don't clobber a selection the user is making INSIDE the modal.
  var sel = window.getSelection && window.getSelection();
  var sheet = document.getElementById("histSheet");
  if (sel && String(sel).length > 0 && sel.anchorNode && sheet.contains(sel.anchorNode)) return;
  var sig = (bk.history || []).length + ":" + ((bk.history || [])[(bk.history || []).length - 1] || {}).at_ms;
  if (sig === HIST_SIG) return; // nothing new → don't rebuild (keeps selection)
  HIST_SIG = sig;
  document.getElementById("histTitle").textContent = "History — " + bk.title;
  document.getElementById("histBody").innerHTML =
    '<div class="hist">' + (historyRows(bk) || '<div class="ap-empty">No events yet.</div>') + '</div>';
}
function refreshHistory() {
  if (!HIST_BOOK) return;
  if (!hasTauri()) { fillHistoryFrom(bookById(HIST_BOOK)); return; }
  invoke("library")
    .then(function (vm) { var b = findBookInVm(vm, HIST_BOOK); if (b) fillHistoryFrom(b); })
    .catch(function () {});
}
function openHistory(bookId) {
  HIST_BOOK = bookId; HIST_SIG = "";
  fillHistoryFrom(bookById(bookId)); // immediate, from in-memory
  document.getElementById("histScrim").classList.add("open");
  document.getElementById("histSheet").classList.add("open");
  if (HIST_TIMER) clearInterval(HIST_TIMER);
  HIST_TIMER = setInterval(refreshHistory, 2000); // live: pull fresh events
  refreshHistory();
}
function closeHistory() {
  if (HIST_TIMER) { clearInterval(HIST_TIMER); HIST_TIMER = null; }
  HIST_BOOK = null;
  document.getElementById("histScrim").classList.remove("open");
  document.getElementById("histSheet").classList.remove("open");
}
function renderDetail() {

  var html = '<div style="float:right;margin:0 0 10px 14px">' + coverImg(bk, "cv-lg") + '</div>';

  // Correct the search metadata + re-query: for a book whose imported title the
  // mirrors couldn't match (e.g. "D'Aulaires' Book of Greek Myths" that resolves

  if (EDIT_BOOK === bk.id) {

      '<div style="display:flex;gap:8px;margin-top:8px">' +

  } else {
    html += '<div style="margin:0 0 10px"><button class="tbtn" data-editbook="' + bk.id + '">✎ Edit title/author &amp; re-query</button></div>';
  }

  if (bk.discovery === "querying") {
    html += '<div class="kv"><span class="k">Status</span><span class="v"><span class="chip-s s-active">Being queried…</span></span></div>' +
      '<div class="kv"><span class="k">Why</span><span class="v">Searching mirrors for matches.</span></div>';
  } else if (bk.review) {
    // Downloaded, but a better match was found on re-query.
    var rec = (bk.versions || []).filter(function (v) { return v.md5 === bk.recommended_md5; })[0];
    var dl = (bk.versions || []).filter(function (v) { return v.state === "done"; })[0];
    html += '<div class="kv"><span class="k">Status</span><span class="v"><span class="chip-s s-attn">Check download</span></span></div>' +
      '<div class="kv"><span class="k">Why</span><span class="v">The downloaded copy may not match this book — a better match was found on re-query.</span></div>';
    if (dl) html += '<div class="kv"><span class="k">Downloaded</span><span class="v">' + esc(dl.title || "—") + ' · ' + dl.fmt.toUpperCase() + ' · ' + dl.size + ' MB</span></div>';
    if (rec) html += '<div class="kv"><span class="k">Recommended</span><span class="v">' + esc(rec.title || "—") + ' · ' + rec.fmt.toUpperCase() + ' · ' + rec.size + ' MB</span></div>';
    html += '<div style="margin:10px 0;display:flex;gap:8px;flex-wrap:wrap">';

    html += '</div>';

  } else if (bk.discovery === "not_found") {

      '<div class="kv"><span class="k">Why</span><span class="v">No mirror returned a match.</span></div>';
    if (MANUAL_FOR === bk.id) {
      html += '<div style="margin-top:12px">' +

        '<div id="manualErr" class="hint" style="color:#c0392b;margin-top:4px"></div>' +
        '<div style="margin-top:8px;display:flex;gap:8px">' +

        '<button class="tbtn" data-manualcancel="1">Cancel</button></div></div>';
    } else {
      html += '<div style="margin-top:12px;display:flex;gap:8px">' +
        '<button class="tbtn" data-requery="' + bk.id + '">Search again</button>' +
        '<button class="tbtn" data-manual="' + bk.id + '">Enter manually</button></div>';
    }
  } else if (bk.discovery === "needs_selection" && requestedVersions(bk).length === 0) {
    html += '<div class="kv"><span class="k">Status</span><span class="v"><span class="chip-s s-attn">Needs you</span></span></div>' +
      '<div class="kv"><span class="k">Why</span><span class="v">No single match cleared the auto-download threshold — choose which variation(s) to download.</span></div>' +
      detailMeta(bk) +
      renderVariationManager(bk) +
      '<div style="margin:12px 0 2px"><button class="tbtn" data-marknf="' + bk.id + '" title="None of these are right — move to Cannot download">✗ Mark as not found</button></div>';
  } else {
    var a = rollup(bk);
    var summary = es === "done" ? '<span class="chip-s s-done">Done</span>'
      : es === "active" ? '<span class="chip-s s-active">Downloading ' + a.done + "/" + a.requested + '</span>'
      : es === "cantdl" ? '<span class="chip-s s-fail">Cannot download</span>'
      : '<span class="chip-s s-queued">' + (bk.priority ? "Next up" : "Queued") + '</span>';
    html += '<div class="kv"><span class="k">Status</span><span class="v">' + summary + '</span></div>';
    if (es === "queued") {
      html += '<div style="margin:10px 0"><button class="tbtn' + (bk.priority ? "" : " primary") +
        '" data-top="' + bk.id + '">' + (bk.priority ? "Remove from top" : "⤒ Move to top of queue") + '</button></div>';
    }
    html += detailMeta(bk) + renderVariationManager(bk);
  }
  // History: a button that opens the chronicle in a modal (not inline).
  if (bk.history && bk.history.length) {
    html += '<div style="margin-top:14px"><button class="tbtn" data-history="' + bk.id +
      '">🕑 Show history (' + bk.history.length + ')</button></div>';
  }
  // "Download whole series →": look the book's series up on Open Library and
  // seed a fresh list with its ordered members (download_series under Tauri).
  html += '<div class="series-actions" style="margin-top:14px;border-top:1px solid var(--line,#2a2a2a);padding-top:12px">' +
    '<button class="tbtn" data-series="' + bk.id + '" title="Find this book&#39;s series on Open Library and download every entry">Download whole series →</button>' +
    '</div>';
  b.innerHTML = html;
}

/* =====================================================================
   Interaction (event delegation - robust + testable)
   ===================================================================== */
document.addEventListener("click", function (e) {
  var t = e.target.closest("[data-action],[data-filter],[data-fmtfilter],[data-list],[data-toggle],[data-open],[data-dl],[data-replace],[data-accept],[data-remove],[data-marknf],[data-cancelv],[data-canceldl],[data-pausev],[data-resumev],[data-reveal],[data-top],[data-series],[data-history],[data-fmtmv],[data-fmtrm],[data-fmtadd],[data-fmtshowall],[data-imptab],[data-toggle-set],[data-manual],[data-manualgo],[data-manualcancel],[data-requery],[data-editbook],[data-editsave],[data-editcancel]");
  if (!t) return;

  if (t.dataset.fmtmv) { // reorder preferred formats
    var fp = t.dataset.fmtmv.split(":"), idx = +fp[0], j = fp[1] === "up" ? idx - 1 : idx + 1;
    if (j >= 0 && j < FORMATS.length) { var tmp = FORMATS[idx]; FORMATS[idx] = FORMATS[j]; FORMATS[j] = tmp; }
    renderFormatRank();
    return;
  }
  if (t.dataset.fmtrm) { // remove a preferred format (keep at least one)
    var ri = FORMATS.indexOf(t.dataset.fmtrm);
    if (ri >= 0 && FORMATS.length > 1) FORMATS.splice(ri, 1);
    renderFormatRank(); return;
  }
  if (t.dataset.fmtadd) { // add a format to the preferred list
    if (FORMATS.indexOf(t.dataset.fmtadd) < 0) FORMATS.push(t.dataset.fmtadd);
    renderFormatRank(); return;
  }
  if (t.dataset.fmtshowall) { SHOW_ALL_FORMATS = !SHOW_ALL_FORMATS; renderFormatRank(); return; }
  if (t.dataset.toggleSet === "seq") { SETTINGS.seq_per_group = !SETTINGS.seq_per_group; renderSettings(); return; }

  if (t.dataset.replace) { // download the recommended copy, Trash the old on success
    var rp = t.dataset.replace.split(":"), rbk = bookById(rp[0]);
    if (rbk) onReplaceDownload(rbk.bid, rp[1], rbk.list);
    return;
  }
  if (t.dataset.history) { openHistory(t.dataset.history); return; }
  if (t.dataset.manual) { // open the manual-md5 input for a not-found book
    MANUAL_FOR = t.dataset.manual; render();
    var mi = document.getElementById("manualMd5"); if (mi) mi.focus();
    return;
  }
  if (t.dataset.manualcancel) { MANUAL_FOR = null; render(); return; }
  if (t.dataset.manualgo) { // submit the pasted md5/URL for download
    var inp = document.getElementById("manualMd5"), errEl = document.getElementById("manualErr");
    var val = inp ? inp.value.trim() : "";
    if (!val) { if (errEl) errEl.textContent = "Paste an md5 or libgen URL first."; return; }
    onAddManual(t.dataset.manualgo, val, errEl);
    return;
  }
  if (t.dataset.requery) { // "Search again": re-query this book's list
    var rqbk = bookById(t.dataset.requery);
    if (rqbk && hasTauri()) onRequery(rqbk.list);
    return;
  }
  if (t.dataset.editbook) { EDIT_BOOK = t.dataset.editbook; render(); return; }
  if (t.dataset.editcancel) { EDIT_BOOK = null; render(); return; }
  if (t.dataset.editsave) {
    var ebk = bookById(t.dataset.editsave);
    var ti = document.getElementById("editTitle"), au = document.getElementById("editAuthor");
    onEditBook(ebk, ti ? ti.value : "", au ? au.value : "");
    return;
  }
  if (t.dataset.accept) { // accept the already-downloaded copy (clear review)
    var abk = bookById(t.dataset.accept);
    onAcceptDownload(abk && abk.bid, abk && abk.list);
    return;
  }
  if (t.dataset.remove) { // move a downloaded variation's file to Trash + remove it
    // The md5 is hex (no ":"), so split on the FIRST ":" only — the book id is
    // everything before it. Do NOT gate on window.confirm(): in the Tauri webview
    // a synchronous confirm() can return false without showing a dialog, which
    // silently swallowed the click. Removal moves the file to Trash (recoverable).
    var sep = t.dataset.remove.indexOf(":");
    var rid = t.dataset.remove.slice(0, sep), rmd5 = t.dataset.remove.slice(sep + 1);
    var rmbk = bookById(rid);
    if (rmbk && hasTauri()) {
      invoke("remove_download", { listId: listArg(rmbk.list), bookId: rmbk.bid, md5: rmd5 })
        .then(applyLibrary)
        .catch(function (err) { toast("Remove failed: " + (errText(err) || "unknown error")); });
    }
    return;
  }
  if (t.dataset.marknf) { // user gives up on a "Needs you" book → Cannot download
    var nbk = bookById(t.dataset.marknf);
    if (nbk) { nbk.discovery = "not_found"; nbk.review = false; render(); } // optimistic
    if (hasTauri() && nbk) {
      invoke("mark_not_found", { listId: listArg(nbk.list), bookId: nbk.bid })
        .then(applyLibrary)
        .catch(function (err) { console.error("mark_not_found failed:", err && err.message); });
    }
    return;
  }
  if (t.dataset.dl) { // download (or re-download/retry) a specific variation
    var p = t.dataset.dl.split(":"), bk = bookById(p[0]), v = bk && bk.versions[+p[1]];
    if (v) { v.state = "downloading"; v.progress = 3; }       // optimistic
    render();
    if (hasTauri() && v) onRequestVariation(bk.bid, v.md5, bk.list);
    return;
  }
  if (t.dataset.cancelv) { // un-request a not-yet-started variation -> available
    var p2 = t.dataset.cancelv.split(":"), bk2 = bookById(p2[0]), v2 = bk2 && bk2.versions[+p2[1]];
    if (v2) { v2.state = "available"; v2.progress = 0; }       // optimistic
    render();
    if (hasTauri() && v2) onCancelVariation(bk2.bid, v2.md5, bk2.list);
    return;
  }
  if (t.dataset.canceldl) { // cancel an in-flight/queued/paused variation download
    var pc = t.dataset.canceldl.split(":"), bkc = bookById(pc[0]), vc = bkc && bkc.versions[+pc[1]];
    if (vc) { vc.state = "cancelled"; vc.progress = 0; }       // optimistic
    render();
    if (hasTauri() && vc) onCancelDownload(bkc.bid, vc.md5, bkc.list);
    return;
  }
  if (t.dataset.pausev) { // pause an in-flight/queued variation download
    var pp = t.dataset.pausev.split(":"), bkp = bookById(pp[0]), vp = bkp && bkp.versions[+pp[1]];
    if (vp) { vp.state = "paused"; }                            // optimistic
    render();
    if (hasTauri() && vp) onPauseVariation(bkp.bid, vp.md5, bkp.list);
    return;
  }
  if (t.dataset.resumev) { // resume a paused variation download
    var pr = t.dataset.resumev.split(":"), bkr = bookById(pr[0]), vr = bkr && bkr.versions[+pr[1]];
    if (vr) { vr.state = "downloading"; }                       // optimistic
    render();
    if (hasTauri() && vr) onResumeVariation(bkr.bid, vr.md5, bkr.list);
    return;
  }
  if (t.dataset.series) { // download the whole series this book belongs to
    var sbk = bookById(t.dataset.series);
    if (sbk) onDownloadSeries(sbk.bid, sbk.list);
    return;
  }
  if (t.dataset.reveal != null) { if (t.dataset.reveal) onReveal(t.dataset.reveal); return; }
  if (t.dataset.top) { var bt = bookById(t.dataset.top); if (bt) bt.priority = !bt.priority; render(); return; }
  if (t.dataset.list) {
    CURRENT = t.dataset.list; FILTER = "all"; FMT_FILTER = ""; SELECTED = null; render();
    if (hasTauri()) invoke("select_list", { listId: CURRENT }).catch(function () {});
    return;
  }
  if (t.dataset.filter) { FILTER = t.dataset.filter; SELECTED = null; render(); return; }
  if (t.dataset.fmtfilter != null) { // toggle the format filter (click active = clear)
    FMT_FILTER = (FMT_FILTER === t.dataset.fmtfilter ? "" : t.dataset.fmtfilter); SELECTED = null; render(); return;
  }
  if (t.dataset.toggle != null) {
    var key = t.dataset.toggle;
    if (key.charAt(0) === "L") { var l = LISTS[+key.slice(1)]; l.collapsedAll = !l.collapsedAll; }
    else { var g = currentList().groups[+key.slice(1)]; g.collapsed = !g.collapsed; }
    render(); return;
  }
  if (t.dataset.open) { // select a book → open its inline detail panel
    if (SELECTED === t.dataset.open) { DETAIL_COLLAPSED = !DETAIL_COLLAPSED; }
    else { SELECTED = t.dataset.open; DETAIL_COLLAPSED = false; }
    render(); return;
  }
  if (t.dataset.imptab) { IMPORT_TAB = t.dataset.imptab; syncImportTabs(); return; }

  var a = t.dataset.action;
  if (a === "toggle-run") { onToggleRun(); return; }
  if (a === "open-import") { openImport(); return; }
  if (a === "close-import") { closeImport(); return; }
  if (a === "confirm-import") { onConfirmImport(); return; }
  if (a === "open-settings") { openSettings(); return; }
  if (a === "close-settings") { closeSettings(); return; }
  if (a === "close-history") { closeHistory(); return; }
  if (a === "save-settings") { onSaveSettings(); return; }
  if (a === "choose-folder") { onChooseFolder(); return; }
  if (a === "refresh-mirrors") { onRefreshMirrors(); return; }
  if (a === "reorganize-files") { onReorganizeFiles(t); return; }
  if (a === "reorganize-details") { onReorganizeDetails(); return; }
  if (a === "cleanup-parts") { onCleanupParts(t); return; }
  if (a === "close-drawer") { DETAIL_COLLAPSED = true; render(); return; }
  if (a === "toggle-active") { ACTIVE_COLLAPSED = !ACTIVE_COLLAPSED; renderActivePanel(); return; }
  if (a === "toggle-sidebar") {
    SIDEBAR_COLLAPSED = !SIDEBAR_COLLAPSED;
    document.getElementById("sidebar").classList.toggle("collapsed", SIDEBAR_COLLAPSED);
    return;
  }
  if (a === "noop") { return; }
});

/* ---- settings sheet ---- */
function openSettings() {
  renderSettings();
  document.getElementById("settingsScrim").classList.add("open");
  document.getElementById("settingsSheet").classList.add("open");
  // Gray "Reorganize now" if the on-disk layout is already canonical.
  if (hasTauri()) {
    invoke("reorganize_needed")
      .then(function (n) { REORG_COUNT = n | 0; renderSettings(); })
      .catch(function () {});
  }
}
function closeSettings() {
  document.getElementById("settingsScrim").classList.remove("open");
  document.getElementById("settingsSheet").classList.remove("open");
}
/* Read the inputs back into state. (Returns the collected values so the Tauri
   save can forward them to set_settings + set_config.) */
function collectSettings() {
  function num(id, def) { var v = parseFloat((document.getElementById(id) || {}).value); return isNaN(v) ? def : v; }
  function str(id, def) { var el = document.getElementById(id); return el ? el.value : def; }
  SETTINGS.auto_threshold = num("setAuto", SETTINGS.auto_threshold);
  SETTINGS.near_threshold = num("setNear", SETTINGS.near_threshold);
  SETTINGS.naming_template = str("setTpl", SETTINGS.naming_template);
  SETTINGS.keep_top = Math.max(1, Math.round(num("setKeep", SETTINGS.keep_top)));
  SETTINGS.language = str("setLang", SETTINGS.language).trim();
  APPCFG.out_dir = str("setOut", APPCFG.out_dir);
  APPCFG.max_concurrent_downloads = Math.max(1, Math.round(num("setMaxDl", APPCFG.max_concurrent_downloads || 5)));
  APPCFG.query_concurrency = Math.max(1, Math.round(num("setQConc", APPCFG.query_concurrency)));
  APPCFG.max_attempts = Math.max(1, Math.round(num("setAttempts", APPCFG.max_attempts)));
  var hedgeEl = document.getElementById("setHedge");
  if (hedgeEl) APPCFG.hedge_enabled = !!hedgeEl.checked;
}
/* Save: collect the inputs, then (under Tauri) persist per-list settings via
   set_settings and global settings via set_config; over file:// just round-trip
   the JS state. */
function onSaveSettings() {
  collectSettings();
  closeSettings();
  render();
  if (!hasTauri()) return;
  // Persist to the engine. The client state (just collected) stays the source of
  // truth for the open UI, so we do NOT re-apply the backend response (which
  // could otherwise momentarily revert the sheet); a relaunch loads the
  // persisted values fresh. "match-title" (the default) is sent as an empty
  // language; the engine infers each book's language from its title's script and
  // applies it as a soft preference (see matching::detect_title_language).
  invoke("set_settings", {
    listId: listArg(CURRENT),
    settings: {
      format_pref: FORMATS,
      language: SETTINGS.language === "match-title" ? "" : SETTINGS.language,
      naming_template: SETTINGS.naming_template,
      auto_threshold: SETTINGS.auto_threshold,
      near_threshold: SETTINGS.near_threshold,
      seq_per_group: SETTINGS.seq_per_group,
      keep_top: SETTINGS.keep_top
    }
  })
    .then(function () {
      return invoke("set_config", {
        config: {
          out_dir: APPCFG.out_dir,
          max_concurrent_downloads: APPCFG.max_concurrent_downloads,
          query_concurrency: APPCFG.query_concurrency,
          max_attempts: APPCFG.max_attempts,
          hedge_enabled: APPCFG.hedge_enabled
        }
      });
    })
    .catch(function (err) {
      console.error("save settings failed:", err && err.message);
      alert("Couldn't save settings: " + ((err && err.message) || err));
    });
}
/* Choose a download folder. Uses the dialog plugin when available; otherwise the
   text field remains the source of truth (an acceptable fallback). */
function onChooseFolder() {
  if (TAURI && TAURI.dialog && TAURI.dialog.open) {
    TAURI.dialog.open({ directory: true, multiple: false })
      .then(function (dir) {
        if (dir) { APPCFG.out_dir = dir; var el = document.getElementById("setOut"); if (el) el.value = dir; }
      })
      .catch(function () {});
  }
}

/* =====================================================================
   Backend actions. Each calls a real Tauri command when the engine is present
   and re-applies the returned ViewModel; over file:// the optimistic local
   mutation above already reflected the change (the demo simulation drives the
   rest).
   ===================================================================== */
/* `listId` is the engine-side list a book belongs to; "__all__" is never a real
   list, so resolve it to null and let the backend fall back to the active list. */
function listArg(listId) { return listId && listId !== "__all__" ? listId : null; }

function onRequestVariation(bookId, md5, listId) {
  invoke("request_variation", { listId: listArg(listId), bookId: bookId, md5: md5 })
    .then(applyLibrary)
    .catch(function (err) {
      // Surface the cross-list guard ("this file is already chosen for …") and any
      // other selection failure — silently swallowing it left the user wondering
      // why a click did nothing.
      toast(errText(err) || "Couldn't select that copy.");
      console.error("request_variation failed:", err && err.message);
    });
}
/* "Enter manually": send a user-pasted md5 (or libgen URL) for a not-found book.
   `bookId` is the composite UI id; the backend needs the per-list bid + list. */
function onAddManual(bookId, input, errEl) {
  if (!hasTauri()) { if (errEl) errEl.textContent = "(only available in the app)"; return; }
  var bk = bookById(bookId);
  if (!bk) return;
  invoke("add_manual_download", { listId: listArg(bk.list), bookId: bk.bid, input: input })
    .then(function (lib) { MANUAL_FOR = null; applyLibrary(lib); })
    .catch(function (err) { if (errEl) errEl.textContent = "Failed: " + (errText(err) || "unknown error"); });
}
/* Replace a wrong download with the recommended copy: queues the recommended
   variation; the old file is moved to Trash once the new one finishes. */
function onReplaceDownload(bookId, md5, listId) {
  if (!hasTauri()) return;
  invoke("replace_download", { listId: listArg(listId), bookId: bookId, recommendedMd5: md5 })
    .then(applyLibrary)
    .then(function () { return invoke("start_downloads", { listId: listArg(listId) }); })
    .then(applyLibrary)
    .catch(function (err) { console.error("replace_download failed:", err && err.message); });
}
/* Accept the already-downloaded copy of a book under review (clear "check
   download"); the book settles as Done without re-downloading. */
function onAcceptDownload(bookId, listId) {
  if (!hasTauri()) {
    var b = bookById(bookId); // offline/preview: optimistic
    if (b) { b.review = false; render(); }
    return;
  }
  invoke("accept_download", { listId: listArg(listId), bookId: bookId })
    .then(applyLibrary)
    .catch(function (err) { console.error("accept_download failed:", err && err.message); });
}
function onCancelVariation(bookId, md5, listId) {
  invoke("cancel_variation", { listId: listArg(listId), bookId: bookId, md5: md5 })
    .then(applyLibrary)
    .catch(function (err) { console.error("cancel_variation failed:", err && err.message); });
}
/* Lifecycle: pause/resume/cancel an in-flight (or queued/paused) variation. */
function onPauseVariation(bookId, md5, listId) {
  invoke("pause_variation", { listId: listArg(listId), bookId: bookId, md5: md5 })
    .then(applyLibrary)
    .catch(function (err) { console.error("pause_variation failed:", err && err.message); });
}
function onResumeVariation(bookId, md5, listId) {
  invoke("resume_variation", { listId: listArg(listId), bookId: bookId, md5: md5 })
    .then(applyLibrary)
    // Resuming returns the job to Pending; kick the queue so it actually continues.
    .then(function (lib) { return invoke("start_downloads", { listId: listArg(listId), site: "libgen.li" }); })
    .then(applyLibrary)
    .catch(function (err) { console.error("resume_variation failed:", err && err.message); });
}
/* "Download whole series →": look the book's series up on Open Library, seed a
   NEW list with its ordered members, and run it. On success the backend returns
   the refreshed library with the new list already selected — adopt that
   selection. Over file:// (no engine) this no-ops gracefully. */
/* In-app toast. The Tauri webview does not reliably show window.alert()/confirm(),
   so user feedback (errors, async results) must render in the DOM. Self-contained:
   no markup/CSS needed up front. */
function toast(msg, opts) {
  opts = opts || {};
  var d = document.createElement("div");
  d.textContent = msg;
  d.style.cssText = "position:fixed;bottom:26px;left:50%;transform:translateX(-50%);" +
    "background:var(--text);color:var(--panel);padding:10px 16px;border-radius:8px;" +
    "font-size:13px;z-index:9999;box-shadow:0 6px 20px rgba(0,0,0,.28);max-width:80%;text-align:center;";
  document.body.appendChild(d);
  // Sticky toasts stay until the caller removes the returned node (e.g. a long
  // async op); otherwise they auto-dismiss.
  if (!opts.sticky) setTimeout(function () { d.remove(); }, opts.ms || 4000);
  return d;
}
function errText(err) { return (typeof err === "string" ? err : (err && err.message)) || ""; }

/* Reliable in-DOM confirm (the webview's confirm() is unreliable — it can return
   false WITHOUT showing a dialog). Renders a sticky toast with Cancel/Confirm and
   runs onYes() only when confirmed. */
function confirmToast(msg, confirmLabel, onYes) {
  var d = document.createElement("div");
  d.style.cssText = "position:fixed;bottom:26px;left:50%;transform:translateX(-50%);" +
    "background:var(--text);color:var(--panel);padding:12px 16px;border-radius:8px;" +
    "font-size:13px;z-index:9999;box-shadow:0 6px 20px rgba(0,0,0,.28);max-width:80%;" +
    "display:flex;flex-direction:column;gap:10px;align-items:center;text-align:center;";
  var m = document.createElement("div"); m.textContent = msg; d.appendChild(m);
  var row = document.createElement("div"); row.style.cssText = "display:flex;gap:8px;";
  var no = document.createElement("button"); no.textContent = "Cancel";
  var yes = document.createElement("button"); yes.textContent = confirmLabel || "Confirm";
  var bs = "padding:5px 14px;border-radius:6px;border:0;cursor:pointer;font-size:13px;";
  no.style.cssText = bs + "background:var(--border-strong);color:var(--text);";
  yes.style.cssText = bs + "background:var(--red);color:#fff;";
  row.appendChild(no); row.appendChild(yes); d.appendChild(row);
  document.body.appendChild(d);
  no.onclick = function () { d.remove(); };
  yes.onclick = function () { d.remove(); onYes(); };
}

function onDownloadSeries(bookId, listId) {
  if (!hasTauri()) return;
  // Sticky loading toast — the Open Library lookup can take several seconds, so
  // keep the indicator up until it resolves (removed in both then/catch).
  var loading = toast("Looking up the series on Open Library… (a few seconds)", { sticky: true });
  invoke("download_series", { listId: listArg(listId), bookId: bookId })
    .then(function (lib) {
      loading.remove();
      if (lib && lib.current) { CURRENT = lib.current; SELECTED = null; }
      toast("Series list created — downloading its books.");
      return applyLibrary(lib);
    })
    .catch(function (err) {
      loading.remove();
      toast(errText(err) || "Could not download the series.");
    });
}
function onCancelDownload(bookId, md5, listId) {
  invoke("cancel_download", { listId: listArg(listId), bookId: bookId, md5: md5 })
    .then(applyLibrary)
    .catch(function (err) { console.error("cancel_download failed:", err && err.message); });
}
function onSetFormatPref() {
  invoke("set_format_pref", { listId: listArg(CURRENT), formats: FORMATS })
    .then(applyLibrary)
    .catch(function (err) { console.error("set_format_pref failed:", err && err.message); });
}
function onReveal(path) {
  if (hasTauri() && path) invoke("reveal", { path: path }).catch(function (err) { console.error("reveal failed:", err && err.message); });
}
/* Global button: "Start downloading for all lists" (start_all) ⇄ "Stop all"
   (stop_all). The engine drives discovery+download in the background. */
function onToggleRun() {
  RUNNING = !RUNNING;
  document.getElementById("runBtn").textContent = RUNNING ? "❚❚ Stop all" : "▶ Start downloading for all lists";
  if (hasTauri()) {
    var cmd = RUNNING ? "start_all" : "stop_all";
    invoke(cmd, {}).then(applyLibrary)
      .catch(function (err) { console.error(cmd + " failed:", err && err.message); })
      .finally(renderActivePanel);
    return;
  }
  if (RUNNING) startSim(); else stopSim();
  renderActivePanel();
}

/* Per-list download control (from the list right-click menu) — engine goals. */
function startListDownloads(listId) {
  if (!listId || listId === "__all__") return;
  if (!hasTauri()) { setQuerying(true, "Starting…"); setTimeout(function () { setQuerying(false); }, 500); return; }
  invoke("start", { listId: listId }).then(applyLibrary)
    .catch(function (err) { console.error("start failed:", err && err.message); })

function onConfirmImport() {

/* Collect the import sheet's current text + format into a backend payload. */
function importPayload() {

  var title = document.getElementById("mTitle").value || "";

/* ---- import sheet ---- */

/* Read a chosen/dropped .md or .json file into the import flow. Format detected
   from the extension, falling back to a content sniff ('{' = JSON). */
function readImportFile(file) {
  if (!file) return;
  var r = new FileReader();
  r.onload = function () {
    var text = String(r.result || "");
    var isJson = /\.json$/i.test(file.name) || text.trim().charAt(0) === "{";
    IMPORT_FILE = { text: text, isJson: isJson, name: file.name };
    var fc = document.getElementById("fileChosen");

      " · " + Math.max(1, Math.round(text.length / 1024)) + " KB";

}
function closeImport() {

function syncImportTabs() {

  document.querySelectorAll("[data-imppane]").forEach(function (p) { p.classList.toggle("hide", p.dataset.imppane !== IMPORT_TAB); });
  updateImportPreview();
}
document.addEventListener("input", function (e) {

  // Live-update the slider value readouts in the Settings sheet.

  if (e.target.id === "setNear") { var v2 = document.getElementById("setNearVal"); if (v2) v2.textContent = (+e.target.value).toFixed(2); }
});

function updateImportPreview() {
  var pv = document.getElementById("importPreview");
  var groups = [];
  try {
    if (IMPORT_TAB === "file") {
      if (!IMPORT_FILE) { pv.innerHTML = '<span style="color:var(--text-faint)">Choose a file to preview its books.</span>'; return; }
      groups = IMPORT_FILE.isJson ? parseJsonPreview(IMPORT_FILE.text) : parseMdPreview(IMPORT_FILE.text);
    } else {
      groups = [{ name: "Manual", books: [ (document.getElementById("mTitle").value || "—") + " — " + (document.getElementById("mAuthor").value || "—") ] }];
    }
  } catch (err) { pv.innerHTML = '<span style="color:var(--red)">Could not parse: ' + esc(err.message) + '</span>'; return; }
  var n = groups.reduce(function (a, g) { return a + g.books.length; }, 0);
  var html = '<div style="color:var(--text-dim);margin-bottom:6px">Preview · ' + groups.length + ' group(s), ' + n + ' book(s)</div>';
  groups.forEach(function (g) {
    html += '<div class="pg">' + esc(g.name) + '</div>';
    g.books.forEach(function (b) { html += '<div class="pb">' + esc(b) + '</div>'; });
  });
